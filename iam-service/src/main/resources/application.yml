server:
  port: 8084

conduit:
  iam:
    # Mandated claim: tenant_id is always included in every issued JWT.
    # Value comes from principal.tenant_id in the database.
    # This fallback is used only when a principal record cannot be loaded.
    default-tenant-id: ${CONDUIT_IAM_DEFAULT_TENANT_ID:default}

spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/meridian}
    username: ${SPRING_DATASOURCE_USERNAME:meridian}
    password: ${SPRING_DATASOURCE_PASSWORD:meridian_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      repositories:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0

  security:
    oauth2:
      authorizationserver:
        issuer: ${IAM_ISSUER_URL:http://localhost:8084}

iam:
  admin:
    password: ${IAM_ADMIN_PASSWORD:Meridian@2024}
  seed:
    enabled: ${IAM_SEED_ENABLED:true}
  cerbos:
    host: ${CERBOS_HOST:cerbos}
    port: ${CERBOS_PORT:3593}
    authz-enabled: ${CERBOS_AUTHZ_ENABLED:true}
  policy-generation:
    enabled: ${IAM_POLICY_GENERATION_ENABLED:true}
    base-url: ${ZAI_BASE_URL:https://api.z.ai/api/paas/v4}
    api-key: ${ZAI_API_KEY:}
    model: ${IAM_POLICY_GENERATION_MODEL:glm-5.2}
  oauth2:
    authorization-store:
      redis:
        key-prefix: ${IAM_OAUTH2_AUTHORIZATION_STORE_REDIS_KEY_PREFIX:iam:oauth2}
    librechat:
      client-id: ${IAM_LIBRECHAT_CLIENT_ID:meridian-librechat}
      client-secret: ${IAM_LIBRECHAT_CLIENT_SECRET:meridian-client-secret-dev}
      redirect-uri: ${IAM_LIBRECHAT_REDIRECT_URI:http://localhost:3080/oauth/openid/callback}
    conduit-chat:
      post-logout-redirect-uri: ${IAM_CONDUIT_CHAT_POST_LOGOUT_REDIRECT_URI:http://localhost:8099/api/auth/login}
    admin-ui:
      client-id: ${IAM_ADMIN_UI_CLIENT_ID:admin-ui-client}
      client-secret: ${IAM_ADMIN_UI_CLIENT_SECRET:admin-ui-secret}
    gateway:
      client-id: ${IAM_GATEWAY_CLIENT_ID:gateway-client}
      client-secret: ${IAM_GATEWAY_CLIENT_SECRET:gateway-secret}
      audience: ${IAM_GATEWAY_AUDIENCE:conduit-gateway}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true

logging:
  level:
    com.openwolf.iam: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
