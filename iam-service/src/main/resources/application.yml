server:
  port: 8084

conduit:
  iam:
    # Mandated claim: tenant_id is always included in every issued JWT and comes from
    # principal.tenant_id in the database. A1: there is NO default fallback for a principal that
    # cannot be loaded — such a subject is un-mintable unless it is an explicitly-bound service
    # client below. (Retained only for legacy references; the token paths no longer read it.)
    default-tenant-id: ${CONDUIT_IAM_DEFAULT_TENANT_ID:default}
    # Explicit tenant binding for non-principal (client_credentials) subjects — config, never
    # caller-supplied. A service subject absent here is un-mintable.
    service-tenants:
      gateway-client: ${CONDUIT_IAM_GATEWAY_CLIENT_TENANT:default}

spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/meridian}
    username: ${SPRING_DATASOURCE_USERNAME:meridian}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      repositories:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0

  security:
    oauth2:
      authorizationserver:
        issuer: ${IAM_ISSUER_URL:http://localhost:8084}

iam:
  admin:
    password: ${IAM_ADMIN_PASSWORD}
  seed:
    enabled: ${IAM_SEED_ENABLED:true}
  cerbos:
    host: ${CERBOS_HOST:cerbos}
    port: ${CERBOS_PORT:3593}
    authz-enabled: ${CERBOS_AUTHZ_ENABLED:true}
  policy-generation:
    enabled: ${IAM_POLICY_GENERATION_ENABLED:true}
    base-url: ${ZAI_BASE_URL:https://api.z.ai/api/paas/v4}
    api-key: ${ZAI_API_KEY:}
    model: ${IAM_POLICY_GENERATION_MODEL:glm-5.2}
  policy-studio:
    cerbos-image: ${CERBOS_IMAGE:ghcr.io/cerbos/cerbos:0.53.0}
    cerbos-version: ${CERBOS_VERSION:0.53.0}
    base-bundle-dir: ${IAM_POLICY_STUDIO_BASE_BUNDLE_DIR:infra/cerbos/policies}
    compile-timeout-seconds: ${IAM_POLICY_STUDIO_COMPILE_TIMEOUT_SECONDS:60}
  break-glass:
    # Exact server-owned tenant|resourceKind|action triples. Empty is intentionally fail-closed;
    # callers can never submit or widen this emergency surface in the API request.
    allowed-grants: ${IAM_BREAK_GLASS_ALLOWED_GRANTS:}
  oauth2:
    authorization-store:
      redis:
        key-prefix: ${IAM_OAUTH2_AUTHORIZATION_STORE_REDIS_KEY_PREFIX:iam:oauth2}
    librechat:
      client-id: ${IAM_LIBRECHAT_CLIENT_ID:meridian-librechat}
      client-secret: ${IAM_LIBRECHAT_CLIENT_SECRET}
      redirect-uri: ${IAM_LIBRECHAT_REDIRECT_URI:http://localhost:3080/oauth/openid/callback}
    conduit-chat:
      client-secret: ${IAM_CONDUIT_CHAT_CLIENT_SECRET}
      post-logout-redirect-uri: ${IAM_CONDUIT_CHAT_POST_LOGOUT_REDIRECT_URI:http://localhost:8099/}
    conduit-insights:
      client-id: ${IAM_CONDUIT_INSIGHTS_CLIENT_ID:conduit-insights}
      redirect-uri: ${IAM_CONDUIT_INSIGHTS_REDIRECT_URI:http://localhost:5175/callback}
      post-logout-redirect-uri: ${IAM_CONDUIT_INSIGHTS_POST_LOGOUT_REDIRECT_URI:http://localhost:5175/}
    admin-ui:
      client-id: ${IAM_ADMIN_UI_CLIENT_ID:admin-ui-client}
      client-secret: ${IAM_ADMIN_UI_CLIENT_SECRET}
    gateway:
      client-id: ${IAM_GATEWAY_CLIENT_ID:gateway-client}
      client-secret: ${IAM_GATEWAY_CLIENT_SECRET}
      audience: ${IAM_GATEWAY_AUDIENCE:conduit-gateway}
    coverage:
      audience: ${IAM_COVERAGE_AUDIENCE:conduit-coverage}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true

logging:
  level:
    com.openwolf.iam: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
