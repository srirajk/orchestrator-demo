spring:
  application:
    name: conduit-chat-bff

  # Blocking MVC + virtual threads is the idiom for this BFF.
  threads:
    virtual:
      enabled: true

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb:27017/conduitchat}
      # Create the @Indexed / @CompoundIndex indexes on startup (notably the messages
      # (conversationId, createdAt) index that backs the per-turn transcript load).
      auto-index-creation: ${MONGODB_AUTO_INDEX:true}

  session:
    store-type: mongodb
    timeout: ${SESSION_TIMEOUT:24h}
    mongodb:
      collection-name: ${SESSION_COLLECTION:sessions}

  servlet:
    multipart:
      # Upper transport bounds; the fine-grained limit is conduit.chat.storage.max-file-size.
      max-file-size: ${CHAT_MAX_FILE_SIZE:26214400}
      max-request-size: ${CHAT_MAX_REQUEST_SIZE:26214400}

  security:
    oauth2:
      client:
        registration:
          conduit-chat:
            provider: conduit-chat
            client-id: ${OIDC_CLIENT_ID:conduit-chat}
            client-secret: ${OIDC_CLIENT_SECRET:conduit-chat-secret}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            # Must match EXACTLY the redirect-uri registered in Axiom (iam-service) for this client.
            # We adapt to Axiom; Axiom is never changed.
            redirect-uri: ${OIDC_REDIRECT_URI:http://localhost:8099/api/auth/callback}
            scope:
              - openid
              - profile
              - email
              - offline_access
        provider:
          conduit-chat:
            # host.docker.internal:8084 is reachable by BOTH the browser (authorize redirect)
            # and this container (token/JWKS/userinfo). The discovery document advertises this
            # issuer, so issuer-uri MUST match it or Spring rejects the discovery.
            issuer-uri: ${OIDC_ISSUER:http://host.docker.internal:8084}

server:
  port: ${PORT:8095}
  servlet:
    session:
      cookie:
        name: ${COOKIE_NAME:SESSION}
        http-only: true
        # COOKIE GOTCHA: a Secure cookie is dropped by the browser over http.
        # The demo runs on http://localhost:8099, so default OFF; set true only behind TLS.
        secure: ${COOKIE_SECURE:false}
        same-site: ${COOKIE_SAME_SITE:lax}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

conduit:
  chat:
    auth:
      post-logout-redirect-uri: ${CHAT_POST_LOGOUT_REDIRECT_URI:http://localhost:8099/}
    gateway:
      base-url: ${GATEWAY_BASE:http://gateway:8080}
      model: ${GATEWAY_MODEL:conduit-assistant}
      # Upper bound on the assistant reply text accumulated in memory for persistence
      # (the client still receives the full stream; only the retained copy is capped).
      max-reply-chars: ${CHAT_MAX_REPLY_CHARS:262144}
    context:
      # Token-budget driven compaction (not message count).
      # Window token budget sent to the gateway each turn.
      max-tokens: ${CHAT_CONTEXT_MAX_TOKENS:3000}
      # Once the full transcript exceeds this, (re)generate the rolling summary and attach it
      # only when the window actually drops older messages.
      summary-trigger-tokens: ${CHAT_SUMMARY_TRIGGER_TOKENS:2000}
      # Regenerate the rolling summary once the transcript grows by this many messages past the
      # count captured at the last generation (keeps the summary rolling instead of frozen).
      summary-refresh-messages: ${CHAT_SUMMARY_REFRESH_MESSAGES:6}
      # tiktoken encoding for estimation (cl100k_base | o200k_base); heuristic fallback otherwise.
      token-encoding: ${CHAT_TOKEN_ENCODING:cl100k_base}
    summary:
      # Facts-free rolling topical summary — OpenAI by default. If base-url or api-key is
      # blank the SummaryService is a safe no-op (keeps the existing summary).
      base-url: ${OPENAI_BASE_URL:${CHAT_SUMMARY_BASE_URL:https://api.openai.com/v1}}
      api-key: ${OPENAI_API_KEY:${CHAT_SUMMARY_API_KEY:}}
      model: ${CHAT_SUMMARY_MODEL:gpt-4o-mini}
      temperature: ${CHAT_SUMMARY_TEMPERATURE:0.2}
      max-tokens: ${CHAT_SUMMARY_MAX_TOKENS:150}
    storage:
      endpoint: ${MINIO_ENDPOINT:http://minio:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:conduit-chat-files}
      # Max accepted upload size in bytes (default 25 MiB).
      max-file-size: ${CHAT_MAX_FILE_SIZE:26214400}

logging:
  level:
    ai.conduit.chat: ${LOG_LEVEL:INFO}
