name: gateway-verify

# H7 — the deterministic gate RUNS the *IT integration proofs.
#
# `mvn verify` (not `mvn test`) so the failsafe-bound *IT integration proofs actually execute:
#   gateway: RedisTenantIsolationProbeIT (cross-tenant Redis isolation — the flagship proof),
#            CerbosDecisionLogDurabilityIT, PayloadStoreIT (payload tamper), CoverageClientTenantHeaderIT,
#            SecurityRejectionIT, HttpAdapterSpillIT, AgentHarnessResilienceIT
#   iam:     BreakGlassExpiryTest (break-glass live-PDP expiry)
#
# Surefire's default `**/*Test.java` EXCLUDES `**/*IT.java`, and `mvn test` never reaches the
# failsafe integration-test/verify goals — so before this workflow these security proofs never ran
# in CI. Docker is present on ubuntu-latest, so CONDUIT_DOCKER_REQUIRED=true makes any Docker
# assume-skip a HARD FAILURE: a silently-skipped security proof must FAIL CI, not pass green.

on:
  push:
    paths:
      - "gateway/**"
      - "iam-service/**"
      - "infra/cerbos/**"
      - ".github/workflows/gateway-verify.yml"
      - "scripts/world-b-check.sh"
  pull_request:
    paths:
      - "gateway/**"
      - "iam-service/**"
      - "infra/cerbos/**"
      - ".github/workflows/gateway-verify.yml"
      - "scripts/world-b-check.sh"

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Docker-gated security proofs are HARD-REQUIRED here (Docker is present on the runner).
      CONDUIT_DOCKER_REQUIRED: "true"
      # Pin the ephemeral Cerbos PDP used by the ITs to the runtime version (matches provisioning).
      CERBOS_IMAGE: "ghcr.io/cerbos/cerbos:0.53.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 25 — the gateway runtime JRE. iam-service compiles at release 25; the gateway
      # compiles at target 21 (bytecode target stays 21) — JDK 25 builds both.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Assert Docker is available (ITs must RUN, not skip)
        run: docker version

      # `mvn verify` = surefire (unit) THEN failsafe (*IT) in one lifecycle pass — unit tests are
      # not double-run. Fails CI if any *IT is red or is skipped for missing Docker.
      - name: Gateway — mvn verify (unit + *IT integration proofs)
        working-directory: gateway
        run: mvn -B verify

      - name: IAM — mvn verify (unit + break-glass live-PDP expiry)
        working-directory: iam-service
        run: mvn -B verify

      # World B: the gateway must carry zero domain knowledge (grep gate, no Docker).
      - name: World B gate (gateway carries no domain knowledge)
        run: scripts/world-b-check.sh --quiet

      - name: Upload surefire/failsafe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            gateway/target/surefire-reports/**
            gateway/target/failsafe-reports/**
            iam-service/target/surefire-reports/**
            iam-service/target/failsafe-reports/**
          if-no-files-found: ignore
