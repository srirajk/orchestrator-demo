services:

  # ── State & search ───────────────────────────────────────────────────────────

  redis-stack:
    image: redis/redis-stack-server:7.4.0-v3
    container_name: meridian-redis
    ports:
      - "6379:6379"
      - "8001:8001"    # RedisInsight (optional dev UI)
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:8.0.20
    container_name: meridian-mongodb
    command: mongod --noauth
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/LibreChat --quiet
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Gateway (the thing we're building) ───────────────────────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: meridian-gateway
    ports:
      - "8080:8080"
    environment:
      ZAI_API_KEY: ${ZAI_API_KEY}
      SPRING_DATA_REDIS_HOST: redis-stack
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      redis-stack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ── Mock agents (placeholder for Phase 1; full impl in Phase 2) ─────────────

  mock-agents:
    build:
      context: ./mock-agents
      dockerfile: Dockerfile
    container_name: meridian-mock-agents
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Chat UI (LibreChat — config + cosmetic only; no code fork) ───────────────

  librechat:
    image: registry.librechat.ai/danny-avila/librechat-dev:latest
    container_name: meridian-librechat
    ports:
      - "3080:3080"
    environment:
      HOST: "0.0.0.0"
      PORT: "3080"
      MONGO_URI: "mongodb://mongodb:27017/LibreChat"
      # Disable Meilisearch — the demo doesn't need conversation search
      SEARCH: "false"
      MEILI_NO_ANALYTICS: "true"
      # Auth
      JWT_SECRET: ${JWT_SECRET:-meridian-demo-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-meridian-demo-jwt-refresh-secret-change-in-production}
      # Open registration so the tester can sign up without an invite
      ALLOW_REGISTRATION: "true"
      ALLOW_SOCIAL_LOGIN: "false"
      NO_INDEX: "true"
    volumes:
      # LibreChat reads its runtime config from /app/.env on startup
      - ./.env:/app/.env:ro
      # Our custom endpoint + UI config
      - ./librechat/librechat.yaml:/app/librechat.yaml:ro
      # Persist uploaded files and conversation images
      - librechat-uploads:/app/uploads
      - librechat-images:/app/client/public/images
    depends_on:
      mongodb:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3080/"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s
    restart: unless-stopped

  # ── Glass-box (standalone SSE trace dashboard — Phase 5 / M9) ───────────────
  # Placeholder: the real single-page HTML/JS panel is built in Phase 5.
  # Uncomment and replace with the real glassbox service then.
  #
  # glassbox:
  #   build: ./glassbox
  #   ports:
  #     - "4000:4000"

  # ── Scale profile (M14 only — Prometheus, Grafana, k6) ──────────────────────
  # These services start only with: docker compose --profile scale up -d

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: meridian-otel
    profiles: [scale]
    volumes:
      - ./infra/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: meridian-prometheus
    profiles: [scale]
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: meridian-grafana
    profiles: [scale]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: meridian
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  redis-data:
  mongo-data:
  librechat-uploads:
  librechat-images:
  grafana-data:
