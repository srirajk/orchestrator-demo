services:

  # ── State ─────────────────────────────────────────────────────────────────────

  redis-stack:
    image: redis/redis-stack-server:7.4.0-v3
    container_name: conduit-redis
    ports:
      - "6379:6379"
      - "8001:8001"    # RedisInsight (optional dev UI)
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:8.0.20
    container_name: conduit-mongodb
    command: mongod --noauth
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/LibreChat --quiet
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Observability stack (always-on — user wants full Grafana/OTel from the start) ──

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: conduit-otel
    volumes:
      - ./infra/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape endpoint
    # Start after Langfuse is healthy so Docker DNS resolves `langfuse` on first connection
    depends_on:
      - langfuse
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: conduit-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP query API
      - "4319:4317"   # OTLP gRPC (host port offset to avoid conflict)
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: conduit-prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: conduit-grafana
    profiles: ["observability"]   # opt-in viewer — `--profile observability` to run
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

  # ── Logs: Loki (store) + Promtail (Docker log shipper) ───────────────────────

  loki:
    image: grafana/loki:2.9.8
    container_name: conduit-loki
    profiles: ["observability"]   # opt-in viewer — `--profile observability` to run
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infra/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"   # Loki HTTP (push + query API)
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: conduit-promtail
    profiles: ["observability"]   # opt-in viewer — `--profile observability` to run
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    volumes:
      - ./infra/promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
      # Docker socket — promtail uses docker_sd_configs to discover containers and
      # stream their stdout/stderr via the Docker API (no host log-file mount needed).
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  # ── Container resource metrics: cAdvisor (CPU/mem per container → Prometheus) ──

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: conduit-cadvisor
    ports:
      - "8090:8080"   # cAdvisor UI + /metrics (host 8090 — 8085/8086 taken by mocks)
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped

  # ── Gateway (Java/Spring Boot — the thing we're building) ────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: conduit-gateway
    ports:
      - "8080:8080"
    environment:
      CONDUIT_LLM_INTENT_CLASSIFIER_BASE_URL: ${CONDUIT_LLM_INTENT_CLASSIFIER_BASE_URL:-https://api.z.ai/api/paas/v4}
      CONDUIT_LLM_INTENT_CLASSIFIER_API_KEY: ${CONDUIT_LLM_INTENT_CLASSIFIER_API_KEY:-${ZAI_API_KEY:-}}
      CONDUIT_LLM_INTENT_CLASSIFIER_MODEL: ${CONDUIT_LLM_INTENT_CLASSIFIER_MODEL:-glm-4.5-flash}
      CONDUIT_LLM_ENTITY_EXTRACTOR_BASE_URL: ${CONDUIT_LLM_ENTITY_EXTRACTOR_BASE_URL:-https://api.z.ai/api/paas/v4}
      CONDUIT_LLM_ENTITY_EXTRACTOR_API_KEY: ${CONDUIT_LLM_ENTITY_EXTRACTOR_API_KEY:-${ZAI_API_KEY:-}}
      CONDUIT_LLM_ENTITY_EXTRACTOR_MODEL: ${CONDUIT_LLM_ENTITY_EXTRACTOR_MODEL:-glm-4.5-flash}
      CONDUIT_LLM_SYNTHESIZER_BASE_URL: ${CONDUIT_LLM_SYNTHESIZER_BASE_URL:-https://api.z.ai/api/paas/v4}
      CONDUIT_LLM_SYNTHESIZER_API_KEY: ${CONDUIT_LLM_SYNTHESIZER_API_KEY:-${ZAI_API_KEY:-}}
      CONDUIT_LLM_SYNTHESIZER_MODEL: ${CONDUIT_LLM_SYNTHESIZER_MODEL:-glm-4.6}
      CONDUIT_LLM_CLARIFICATION_COMPOSER_BASE_URL: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_BASE_URL:-https://api.z.ai/api/paas/v4}
      CONDUIT_LLM_CLARIFICATION_COMPOSER_API_KEY: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_API_KEY:-${ZAI_API_KEY:-}}
      CONDUIT_LLM_CLARIFICATION_COMPOSER_MODEL: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_MODEL:-glm-4.5-flash}
      SPRING_DATA_REDIS_HOST: redis-stack
      SPRING_DATA_REDIS_PORT: 6379
      CONDUIT_EMBEDDING_PROVIDER: remote
      CONDUIT_EMBEDDING_REMOTE_URL: http://embeddings:8083/v1/embeddings
      CONDUIT_EMBEDDING_DIMENSION: 384
      # OTel export — all signals through the collector; collector fans out to Tempo + Langfuse.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      CERBOS_HOST: cerbos
      CERBOS_HTTP_PORT: 3592
      # Phase 8: RS256 JWKS endpoint — use direct /oauth2/jwks (no redirect hop)
      CONDUIT_AUTH_JWKS_URL: http://iam-service:8084/oauth2/jwks
      CONDUIT_AUTH_REQUIRED_AUDIENCE: ${IAM_GATEWAY_AUDIENCE:-conduit-gateway}
      WEALTH_COVERAGE_URL: http://wealth-coverage:8086
      # World B: second domain (insurance) onboarded by manifests + services only —
      # no gateway code change. The insurance domain manifest references these URLs.
      INSURANCE_HTTP_URL: http://insurance-http:8087
      INSURANCE_COVERAGE_URL: http://insurance-coverage:8088
      # World B: agent + domain manifests are read from the mounted ./registry volume,
      # NOT baked into the image. Onboard a domain by dropping JSON here + restart.
      CONDUIT_REGISTRY_LOCATION: file:/registry/
      # Multi-step orchestration (D11): derive+execute the producer→consumer DAG for fan-in
      # analytics goals. Reversible — set to "false" (or remove) to fall back to flat fan-out.
      CONDUIT_ORCHESTRATION_DAG_ENABLED: "true"
      CONDUIT_ASSISTANT_DOMAIN_CONTEXT: ${CONDUIT_ASSISTANT_DOMAIN_CONTEXT:-an enterprise assistant for banking staff — covering client financial data, market research, and internal HR policies}
      # ── Conduit Insights: metric sources (in-network URLs; keys from env) ──────
      CONDUIT_INSIGHTS_PROMETHEUS_URL: http://prometheus:9090
      CONDUIT_INSIGHTS_LANGFUSE_URL: http://langfuse:3000
      CONDUIT_INSIGHTS_LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PROJECT_PUBLIC_KEY:-pk-lf-meridian-public}
      CONDUIT_INSIGHTS_LANGFUSE_SECRET_KEY: ${LANGFUSE_PROJECT_SECRET_KEY:-sk-lf-meridian-secret}
    volumes:
      - ./registry:/registry:ro
    depends_on:
      redis-stack:
        condition: service_healthy
      embeddings:
        condition: service_healthy
      cerbos:
        condition: service_healthy
      iam-service:
        condition: service_healthy
      insurance-http:
        condition: service_healthy
      insurance-coverage:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ── Embedding sidecar (sentence-transformers all-MiniLM-L6-v2, 384-dim) ──────

  embeddings:
    build:
      context: ./mock-agents/embeddings
      dockerfile: Dockerfile
    container_name: conduit-embeddings
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Mock agents (Domain 1: Wealth HTTP / Domain 2: Asset Servicing MCP) ──────

  wealth-http:
    build:
      context: ./mock-agents/wealth
      dockerfile: Dockerfile
    container_name: conduit-wealth-http
    ports:
      - "8081:8081"
    environment:
      WEALTH_AGENT_LLM_BASE_URL: ${WEALTH_AGENT_LLM_BASE_URL:-https://api.z.ai/api/paas/v4}
      WEALTH_AGENT_LLM_API_KEY: ${WEALTH_AGENT_LLM_API_KEY:-}
      WEALTH_AGENT_LLM_MODEL: ${WEALTH_AGENT_LLM_MODEL:-glm-4.5-flash}
      HOLDINGS_LLM_BASE_URL: ${HOLDINGS_LLM_BASE_URL:-}
      HOLDINGS_LLM_API_KEY: ${HOLDINGS_LLM_API_KEY:-}
      HOLDINGS_LLM_MODEL: ${HOLDINGS_LLM_MODEL:-}
      PERFORMANCE_LLM_BASE_URL: ${PERFORMANCE_LLM_BASE_URL:-}
      PERFORMANCE_LLM_API_KEY: ${PERFORMANCE_LLM_API_KEY:-}
      PERFORMANCE_LLM_MODEL: ${PERFORMANCE_LLM_MODEL:-}
      GOAL_PLANNING_LLM_BASE_URL: ${GOAL_PLANNING_LLM_BASE_URL:-}
      GOAL_PLANNING_LLM_API_KEY: ${GOAL_PLANNING_LLM_API_KEY:-}
      GOAL_PLANNING_LLM_MODEL: ${GOAL_PLANNING_LLM_MODEL:-}
      RISK_PROFILE_LLM_BASE_URL: ${RISK_PROFILE_LLM_BASE_URL:-}
      RISK_PROFILE_LLM_API_KEY: ${RISK_PROFILE_LLM_API_KEY:-}
      RISK_PROFILE_LLM_MODEL: ${RISK_PROFILE_LLM_MODEL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  servicing-mcp:
    build:
      context: ./mock-agents/servicing
      dockerfile: Dockerfile
    container_name: conduit-servicing-mcp
    ports:
      - "8082:8082"
    environment:
      # Fault knobs — override in tests; defaults leave all tools healthy
      MCP_FAULT_TOOL: ""
      MCP_FAULT_ALL: "false"
      MCP_FAULT_DELAY_MS: "0"
      SERVICING_AGENT_LLM_BASE_URL: ${SERVICING_AGENT_LLM_BASE_URL:-https://api.z.ai/api/paas/v4}
      SERVICING_AGENT_LLM_API_KEY: ${SERVICING_AGENT_LLM_API_KEY:-}
      SERVICING_AGENT_LLM_MODEL: ${SERVICING_AGENT_LLM_MODEL:-glm-4.5-flash}
      SETTLEMENTS_LLM_BASE_URL: ${SETTLEMENTS_LLM_BASE_URL:-}
      SETTLEMENTS_LLM_API_KEY: ${SETTLEMENTS_LLM_API_KEY:-}
      SETTLEMENTS_LLM_MODEL: ${SETTLEMENTS_LLM_MODEL:-}
      CORPORATE_ACTIONS_LLM_BASE_URL: ${CORPORATE_ACTIONS_LLM_BASE_URL:-}
      CORPORATE_ACTIONS_LLM_API_KEY: ${CORPORATE_ACTIONS_LLM_API_KEY:-}
      CORPORATE_ACTIONS_LLM_MODEL: ${CORPORATE_ACTIONS_LLM_MODEL:-}
      CUSTODY_LLM_BASE_URL: ${CUSTODY_LLM_BASE_URL:-}
      CUSTODY_LLM_API_KEY: ${CUSTODY_LLM_API_KEY:-}
      CUSTODY_LLM_MODEL: ${CUSTODY_LLM_MODEL:-}
      CASH_LLM_BASE_URL: ${CASH_LLM_BASE_URL:-}
      CASH_LLM_API_KEY: ${CASH_LLM_API_KEY:-}
      CASH_LLM_MODEL: ${CASH_LLM_MODEL:-}
      NAV_LLM_BASE_URL: ${NAV_LLM_BASE_URL:-}
      NAV_LLM_API_KEY: ${NAV_LLM_API_KEY:-}
      NAV_LLM_MODEL: ${NAV_LLM_MODEL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  wealth-coverage:
    build:
      context: ./mock-agents/wealth-coverage
      dockerfile: Dockerfile
    container_name: wealth-coverage
    ports:
      - "8086:8086"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8086/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── World B: knowledge agents (no coverage) — market research + HR policy ──────

  wealth-market-research:
    build:
      context: ./mock-agents/wealth-market-research
      dockerfile: Dockerfile
    container_name: conduit-wealth-market-research
    ports:
      - "8089:8089"
    environment:
      PYTHONUNBUFFERED: "1"
      OTEL_SERVICE_NAME: conduit-wealth-market-research
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8089/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hr-policy:
    build:
      context: ./mock-agents/hr-policy
      dockerfile: Dockerfile
    container_name: conduit-hr-policy
    ports:
      - "8091:8091"
    environment:
      PYTHONUNBUFFERED: "1"
      OTEL_SERVICE_NAME: conduit-hr-policy
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── World B: second domain (Insurance) — onboarded by manifests + services only ──

  insurance-http:
    build:
      context: ./mock-agents/insurance
      dockerfile: Dockerfile
    container_name: conduit-insurance-http
    ports:
      - "8087:8087"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8087/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  insurance-coverage:
    build:
      context: ./mock-agents/insurance-coverage
      dockerfile: Dockerfile
    container_name: insurance-coverage
    ports:
      - "8088:8088"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Cerbos PDP — policy enforcement point for ABAC entitlements ──────────────
  cerbos:
    image: ghcr.io/cerbos/cerbos:latest
    container_name: conduit-cerbos
    ports:
      - "3594:3592"   # HTTP API (host 3594 to avoid conflict with other cerbos instances)
      - "3595:3593"   # gRPC
    volumes:
      - ./infra/cerbos:/conf:ro
    command: server --config=/conf/config.yaml
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--insecure"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Postgres — primary data store for iam-service (principals, roles, domains) ──
  postgres:
    image: postgres:16-alpine
    container_name: conduit-postgres
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meridian_dev}
      POSTGRES_DB: meridian
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── IAM Service — Java 21 + Spring Boot 3.5 (JWT issuance + user CRUD + OIDC) ──
  iam-service:
    build:
      context: ./iam-service
      dockerfile: Dockerfile
    image: conduit/iam-service:latest
    container_name: conduit-iam-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/meridian
      SPRING_DATASOURCE_USERNAME: meridian
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-meridian_dev}
      SPRING_DATA_REDIS_HOST: redis-stack
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_DATABASE: "4"
      IAM_OAUTH2_AUTHORIZATION_STORE_REDIS_KEY_PREFIX: iam:oauth2
      IAM_ISSUER_URL: ${IAM_ISSUER_URL:-http://host.docker.internal:8084}
      IAM_ADMIN_PASSWORD: ${IAM_ADMIN_PASSWORD:-Meridian@2024}
      CERBOS_HOST: cerbos
      CERBOS_PORT: "3593"
      CERBOS_AUTHZ_ENABLED: ${CERBOS_AUTHZ_ENABLED:-true}
      IAM_SEED_ENABLED: "true"
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      IAM_POLICY_GENERATION_ENABLED: ${IAM_POLICY_GENERATION_ENABLED:-true}
      # Quality tier: policy drafting is rare + human-approved, so a strong (not max)
      # model is right. Reconciled to glm-4.6 to match the Java default and the
      # model-selection guide; override to a stronger model when one is available.
      IAM_POLICY_GENERATION_MODEL: ${IAM_POLICY_GENERATION_MODEL:-glm-4.6}
      # OAuth2 client registration — must match LibreChat's OPENID_CLIENT_ID/SECRET
      IAM_LIBRECHAT_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-meridian-client-secret-dev}
      IAM_LIBRECHAT_REDIRECT_URI: ${IAM_LIBRECHAT_REDIRECT_URI:-http://localhost:3080/oauth/openid/callback}
      IAM_CONDUIT_CHAT_POST_LOGOUT_REDIRECT_URI: ${IAM_CONDUIT_CHAT_POST_LOGOUT_REDIRECT_URI:-http://localhost:8099/}
      IAM_CONDUIT_INSIGHTS_REDIRECT_URI: ${IAM_CONDUIT_INSIGHTS_REDIRECT_URI:-http://localhost:5175/callback}
      IAM_CONDUIT_INSIGHTS_POST_LOGOUT_REDIRECT_URI: ${IAM_CONDUIT_INSIGHTS_POST_LOGOUT_REDIRECT_URI:-http://localhost:5175/}
      # Audience stamped on Axiom access tokens that are forwarded to the gateway.
      IAM_GATEWAY_AUDIENCE: ${IAM_GATEWAY_AUDIENCE:-conduit-gateway}
      # Persist the RSA signing key (+ its stable kid) to a named volume so a restart does not
      # regenerate it and invalidate every live session. See SecurityConfig#loadOrGenerateRsaKey.
      IAM_SIGNING_KEY_PATH: /app/keys/signing-key.json
    volumes:
      - iam-signing-key:/app/keys
    depends_on:
      redis-stack:
        condition: service_healthy
      postgres:
        condition: service_healthy
      cerbos:
        condition: service_healthy
    healthcheck:
      test: ["CMD","wget","--no-verbose","--tries=1","--spider","http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # ── Admin UI — React SPA for user/role management (served by nginx) ─────────
  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8084
    container_name: conduit-admin-ui
    ports:
      - "5180:80"
    depends_on:
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Conduit Chat — Node BFF serving built React SPA + /api/* routes ──────────
  conduit-chat:
    build:
      context: ./apps/chat
      dockerfile: Dockerfile
    container_name: conduit-chat
    # host.docker.internal must resolve from inside the container (Docker Desktop provides
    # it automatically; this mapping makes it explicit and works on Linux engines too). The
    # OIDC issuer uses it so the SAME issuer URL is reachable by both the browser (authorize
    # redirect) and this container (token/JWKS/userinfo).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8099:8095"
    environment:
      # ── Core wiring ────────────────────────────────────────────────────────────
      MONGODB_URI: ${CHAT_MONGODB_URI:-mongodb://mongodb:27017/conduitchat}
      GATEWAY_BASE: ${CHAT_GATEWAY_BASE:-http://gateway:8080}
      GATEWAY_MODEL: ${CHAT_GATEWAY_MODEL:-conduit-assistant}
      # ── OIDC / Axiom ───────────────────────────────────────────────────────────
      # Must be reachable by BOTH the browser and this container, and must match the issuer
      # advertised by Axiom's discovery document. Do NOT use iam-service or localhost here.
      OIDC_ISSUER: ${CHAT_OIDC_ISSUER:-http://host.docker.internal:8084}
      OIDC_CLIENT_ID: ${CHAT_OIDC_CLIENT_ID:-conduit-chat}
      OIDC_CLIENT_SECRET: ${CHAT_OIDC_CLIENT_SECRET:-conduit-chat-secret}
      # Must match EXACTLY the redirect-uri Axiom already has registered (never change Axiom).
      OIDC_REDIRECT_URI: ${CHAT_OIDC_REDIRECT_URI:-http://localhost:8099/api/auth/callback}
      CHAT_POST_LOGOUT_REDIRECT_URI: ${CHAT_POST_LOGOUT_REDIRECT_URI:-http://localhost:8099/}
      # ── Session cookie ─────────────────────────────────────────────────────────
      # Session cookie must NOT be Secure over http (demo runs on http://localhost:8099).
      COOKIE_SECURE: ${CHAT_COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${CHAT_COOKIE_SAME_SITE:-lax}
      SESSION_TIMEOUT: ${CHAT_SESSION_TIMEOUT:-24h}
      # ── Memory: token-budget driven compaction (not message count) ─────────────
      CHAT_CONTEXT_MAX_TOKENS: ${CHAT_CONTEXT_MAX_TOKENS:-3000}
      CHAT_SUMMARY_TRIGGER_TOKENS: ${CHAT_SUMMARY_TRIGGER_TOKENS:-2000}
      CHAT_TOKEN_ENCODING: ${CHAT_TOKEN_ENCODING:-cl100k_base}
      # ── Facts-free rolling-summary LLM (OpenAI-compatible) ─────────────────────
      # Defaults to the same OpenAI-compatible LLM key already in .env (the gateway
      # synthesizer / Z.AI GLM) — nothing hardcoded, works out of the box. Set OPENAI_*
      # explicitly to point summaries at real OpenAI instead.
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-${CONDUIT_LLM_SYNTHESIZER_BASE_URL:-https://api.z.ai/api/paas/v4}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-${CONDUIT_LLM_SYNTHESIZER_API_KEY:-}}
      CHAT_SUMMARY_MODEL: ${CHAT_SUMMARY_MODEL:-${CONDUIT_LLM_SYNTHESIZER_MODEL:-glm-4.5-flash}}
      CHAT_SUMMARY_TEMPERATURE: ${CHAT_SUMMARY_TEMPERATURE:-0.2}
      CHAT_SUMMARY_MAX_TOKENS: ${CHAT_SUMMARY_MAX_TOKENS:-150}
      # ── Files / object store (MinIO) ───────────────────────────────────────────
      MINIO_ENDPOINT: ${CHAT_MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      MINIO_BUCKET: ${CHAT_MINIO_BUCKET:-conduit-chat-files}
      CHAT_MAX_FILE_SIZE: ${CHAT_MAX_FILE_SIZE:-26214400}
      LOG_LEVEL: ${CHAT_LOG_LEVEL:-INFO}
    depends_on:
      mongodb:
        condition: service_healthy
      gateway:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8095/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── Conduit Insights — public PKCE SPA + same-origin nginx proxy ─────────────
  conduit-insights:
    build:
      context: ./apps/insights/web
      dockerfile: Dockerfile
    container_name: conduit-insights
    ports:
      - "5175:80"
    depends_on:
      gateway:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Langfuse v3 — LLM observability: sessions, dashboards, inline evals ───────
  # v3 requires ClickHouse as the columnar trace store (new in v3 vs v2)

  # ── MinIO — S3-compatible blob store for Langfuse v3 event/media storage ────────
  minio:
    image: minio/minio:latest
    container_name: conduit-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Create the required Langfuse bucket in MinIO at startup
  minio-init:
    image: minio/mc:latest
    container_name: conduit-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-miniosecret} &&
      mc mb --ignore-existing local/langfuse-events &&
      mc mb --ignore-existing local/langfuse-media &&
      echo 'MinIO buckets ready'
      "
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3.3
    container_name: conduit-clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    container_name: conduit-langfuse-db
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:3
    container_name: conduit-langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis-stack:
        condition: service_healthy
    ports:
      - "3030:3000"
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-meridian-langfuse-nextauth-secret}
      NEXTAUTH_URL: http://localhost:3030
      SALT: ${LANGFUSE_SALT:-meridian-langfuse-salt-changeme}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-fb53c0e05d8044c734a1b20044e89f6c33783e489635b6e4bba69b231ce47bd8}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_LOG_LEVEL: warn
      LANGFUSE_WORKER_HOST: http://langfuse-worker:3030
      # ClickHouse — columnar trace store (required in v3)
      CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD:-clickhouse}@clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      # MinIO — S3-compatible blob store for event/media uploads
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
      # Redis — required for OTLP ingestion queue (BullMQ)
      REDIS_HOST: redis-stack
      REDIS_PORT: "6379"
      REDIS_TLS_ENABLED: "false"
      # Pre-seeded org/project/user
      LANGFUSE_INIT_ORG_ID: meridian
      LANGFUSE_INIT_ORG_NAME: "Meridian Bank"
      LANGFUSE_INIT_PROJECT_ID: meridian-gateway
      LANGFUSE_INIT_PROJECT_NAME: "Meridian AI Gateway"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PROJECT_PUBLIC_KEY:-pk-lf-meridian-public}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_PROJECT_SECRET_KEY:-sk-lf-meridian-secret}
      LANGFUSE_INIT_USER_EMAIL: admin@meridian.bank
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_ADMIN_PASSWORD:-changeme}
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: conduit-langfuse-worker
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis-stack:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-meridian-langfuse-nextauth-secret}
      SALT: ${LANGFUSE_SALT:-meridian-langfuse-salt-changeme}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-fb53c0e05d8044c734a1b20044e89f6c33783e489635b6e4bba69b231ce47bd8}
      PORT: "3030"
      LANGFUSE_LOG_LEVEL: warn
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD:-clickhouse}@clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
      REDIS_HOST: redis-stack
      REDIS_PORT: "6379"
      REDIS_TLS_ENABLED: "false"
    restart: unless-stopped

  # Real-time eval worker: scores every new Langfuse trace with DeepEval and posts
  # faithfulness / relevancy / hallucination scores back — visible inline per trace.
  langfuse-eval-worker:
    build:
      context: ./scripts/eval-worker
      dockerfile: Dockerfile
    container_name: conduit-eval-worker
    profiles: [eval]
    depends_on:
      - langfuse
      - gateway
    environment:
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PROJECT_PUBLIC_KEY:-pk-lf-meridian-public}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_PROJECT_SECRET_KEY:-sk-lf-meridian-secret}
      LANGFUSE_HOST: http://langfuse:3000
      GATEWAY_HOST: http://gateway:8080
      USER_MGMT_HOST: http://iam-service:8084
      ZAI_API_KEY: ${ZAI_API_KEY}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      ZAI_EVAL_MODEL: ${ZAI_EVAL_MODEL:-glm-4.5-flash}
      EVAL_POLL_INTERVAL_SECONDS: ${EVAL_POLL_INTERVAL_SECONDS:-300}
    restart: unless-stopped

  # Continuous trace scorer: fetches recent Langfuse traces on a loop and posts
  # grounding / partial-honesty / relevance / safety scores back (eval/langfuse_continuous.py).
  # Passive (does not drive the gateway). Starts BY DEFAULT so live quality scores flow on `up`;
  # the on-demand DeepEval release gate (langfuse-eval-worker, above) stays under `--profile eval`.
  # (To run the gateway without continuous eval cost, add `profiles: [eval]` back here.)
  eval-worker:
    build:
      context: ./eval
      dockerfile: Dockerfile
    container_name: conduit-eval-continuous
    depends_on:
      - langfuse
    environment:
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PROJECT_PUBLIC_KEY:-pk-lf-meridian-public}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_PROJECT_SECRET_KEY:-sk-lf-meridian-secret}
      LANGFUSE_HOST: http://langfuse:3000
      ZAI_API_KEY: ${ZAI_API_KEY}
      # Async/background judge. It is sequential + low-volume (a handful of calls per
      # interval) — NOT concurrent load — so it runs on OpenAI for reliable structured
      # output. The funnel (throttle + exponential backoff) is retained for whichever
      # provider is set. To run it on GLM instead, point JUDGE_* at the Z.AI values.
      JUDGE_BASE_URL: ${JUDGE_BASE_URL:-https://api.openai.com/v1}
      JUDGE_API_KEY: ${JUDGE_API_KEY:-${CONDUIT_LLM_SYNTHESIZER_API_KEY}}
      JUDGE_MODEL: ${JUDGE_MODEL:-gpt-4o-mini}
      EVAL_TRACE_NAME: ${EVAL_TRACE_NAME:-chat-turn}
      EVAL_JUDGE_THROTTLE_MS: ${EVAL_JUDGE_THROTTLE_MS:-300}
      EVAL_JUDGE_MAX_RETRIES: ${EVAL_JUDGE_MAX_RETRIES:-4}
      EVAL_INTERVAL_SECONDS: ${EVAL_INTERVAL_SECONDS:-300}
      EVAL_LOOKBACK_HOURS: ${EVAL_LOOKBACK_HOURS:-24}
      EVAL_TRACE_LIMIT: ${EVAL_TRACE_LIMIT:-50}
    restart: unless-stopped

  # ── Boot provisioner: THE one demo-data seeder ────────────────────────────────
  # Every demo-data seeding step lives in this single service. It runs ONCE, at the end,
  # after the whole stack is healthy (depends_on: service_healthy on everything the steps
  # touch), then exits. NO docker exec, NO host dependency, NO docker socket — every hop is
  # over the Docker network and every endpoint/key/cred comes from env. The orchestration
  # (health waits → principals → Langfuse prices → BFF conversations → datasets → dashboard,
  # in that order, each idempotent) is scripts/seed-all.sh.
  #
  # One image (infra/seeder) carries everything the steps need: python3 + requests +
  # langfuse, curl, redis-cli, psql. (minio-init stays separate — it is pre-boot infra that
  # must run BEFORE minio-dependent services, not demo-data seeding.)
  seeder:
    build:
      context: ./infra/seeder
      dockerfile: Dockerfile
    container_name: conduit-seeder
    volumes:
      - ./scripts:/scripts:ro
      - ./registry:/registry:ro
      - ./eval:/eval:ro
    environment:
      # Internal (in-network) URLs — never localhost.
      REDIS_HOST: redis-stack
      REDIS_PORT: "6379"
      GATEWAY_URL: http://gateway:8080
      CHAT_BFF_URL: http://conduit-chat:8095
      IAM_URL: http://iam-service:8084
      LANGFUSE_URL: http://langfuse:3000
      # Same Langfuse key defaults every other service uses.
      LANGFUSE_PROJECT_PUBLIC_KEY: ${LANGFUSE_PROJECT_PUBLIC_KEY:-pk-lf-meridian-public}
      LANGFUSE_PROJECT_SECRET_KEY: ${LANGFUSE_PROJECT_SECRET_KEY:-sk-lf-meridian-secret}
      # Langfuse Postgres (dashboard step).
      LANGFUSE_DB_HOST: langfuse-db
      LANGFUSE_DB_PORT: "5432"
      LANGFUSE_DB_USER: ${LANGFUSE_DB_USER:-langfuse}
      LANGFUSE_DB_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
      LANGFUSE_DB_NAME: langfuse
      SEED_PASSWORD: ${SEED_PASSWORD:-Meridian@2024}
    depends_on:
      redis-stack:
        condition: service_healthy
      gateway:
        condition: service_healthy
      conduit-chat:
        condition: service_healthy
      iam-service:
        condition: service_healthy
      langfuse:
        condition: service_started
      langfuse-db:
        condition: service_healthy
    command: ["bash", "/scripts/seed-all.sh"]
    restart: "no"

  # ── k6 load test — Phase 7 only (scale profile) ───────────────────────────────

  k6:
    image: grafana/k6:latest
    container_name: conduit-k6
    profiles: [scale]
    volumes:
      - ./tests/load:/scripts
    environment:
      K6_OUT: "experimental-prometheus-rw=http://prometheus:9090/api/v1/write"
    command: run /scripts/load-test.js

  # ── Axiom admin console (apps/admin — split target; supersedes the legacy admin-ui) ──
  admin-console:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8084
    container_name: axiom-admin-console
    ports:
      - "5182:80"
    depends_on:
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  redis-data:
  mongo-data:
  grafana-data:
  tempo-data:
  langfuse-db-data:
  clickhouse-data:
  minio-data:
  postgres_data:
  loki-data:
  # Persists the iam-service RSA signing key so its kid is stable across restarts.
  iam-signing-key:
