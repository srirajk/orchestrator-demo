version: 1.3.13
cache: true

# Meridian branding pass — cosmetic only; no LibreChat code changes.
# Full rebrand (logo, theme, title) comes in Phase 6 / M12.

interface:
  # Hide model selector — Meridian reads as one bespoke assistant, not an "LLM picker"
  modelSelect: false
  parameters: false
  presets: false

endpoints:
  custom:
    - name: "Meridian"
      apiKey: "unused"         # gateway does not enforce API keys in the demo
      baseURL: "http://gateway:8080/v1"
      models:
        default:
          - "meridian-assistant"
        fetch: false           # models are static; no /v1/models poll needed at startup
      titleConvo: false        # prevents LibreChat from firing a separate title-gen SSE call
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Meridian AI"
      # Parameters LibreChat sends that our gateway doesn't accept yet — drop them
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
        - "top_p"
        - "n"
        - "logprobs"
      streamRate: 35           # ms between chunk forwards; smooth rendering in the UI
