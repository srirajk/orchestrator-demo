version: 1.3.13
cache: true

interface:
  appTitle: "Conduit AI"
  modelSelect: false
  parameters: false
  presets: false
  agents: false

endpoints:
  custom:
    - name: "Conduit"
      # "user_provided": each logged-in user supplies their own gateway JWT as the API key.
      # After logging in via OIDC, users copy their access_token from
      # http://localhost:8084/auth/token and paste it in LibreChat endpoint settings once.
      # The gateway validates the RS256 JWT and reads the `sub` claim for identity.
      #
      # For the quickstart demo without OIDC, change to apiKey: "unused" — the gateway
      # will ignore it and fall back to the X-User-Id header below.
      apiKey: "unused"
      baseURL: "http://gateway:8080/v1"
      models:
        default:
          - "conduit-assistant"
        fetch: false
      titleConvo: false
      summarize: true
      forcePrompt: false
      modelDisplayLabel: "Conduit AI"
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
        - "top_p"
        - "n"
        - "logprobs"
      streamRate: 35
      headers:
        # Fallback identity header — used when no valid Bearer JWT is present.
        # Dynamically overridden by the OIDC access_token (JWT sub) when users
        # paste their token in endpoint settings.
        X-User-Id: "rm_jane"
