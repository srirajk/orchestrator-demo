version: 1.3.13
cache: true

interface:
  appTitle: "Conduit AI"
  modelSelect: false
  parameters: false
  presets: false
  agents: false

endpoints:
  custom:
    - name: "Conduit"
      # LibreChat requires an apiKey value for OpenAI-compatible custom endpoints.
      # The real gateway credential is forwarded below from the Axiom OIDC session.
      apiKey: "unused"
      baseURL: "http://gateway:8080/v1"
      models:
        default:
          - "conduit-assistant"
        fetch: false
      titleConvo: false
      summarize: true
      forcePrompt: false
      modelDisplayLabel: "Conduit AI"
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
        - "top_p"
        - "n"
        - "logprobs"
      streamRate: 35
      headers:
        # Resolved server-side by LibreChat when OPENID_REUSE_TOKENS=true.
        # The gateway validates this RS256 JWT and uses `sub` as the caller.
        Authorization: "Bearer {{LIBRECHAT_OPENID_ACCESS_TOKEN}}"
