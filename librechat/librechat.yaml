version: 1.3.13
cache: true

interface:
  appTitle: "Meridian AI"
  modelSelect: false
  parameters: false
  presets: false
  agents: false

endpoints:
  custom:
    - name: "Meridian"
      apiKey: "unused"
      baseURL: "http://gateway:8080/v1"
      models:
        default:
          - "meridian-assistant"
        fetch: false
      titleConvo: false
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Meridian AI"
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
        - "top_p"
        - "n"
        - "logprobs"
      streamRate: 35
