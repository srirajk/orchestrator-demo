<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conduit Glass-Box — Live Decision Trace</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #22263a;
    --border: #2a2d3e;
    --accent: #00b4c8;
    --accent2: #0097ab;
    --text: #e2e8f0;
    --muted: #8892a4;
    --http: #3b82f6;
    --mcp: #7c3aed;
    --ok: #22c55e;
    --fail: #ef4444;
    --denied: #f97316;
    --pending: #eab308;
    --running: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; color: var(--accent); }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); animation: pulse 1.5s infinite; }
  .pulse.offline { background: var(--fail); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  .conn-status { font-size: 11px; color: var(--muted); margin-left: auto; }
  .gateway-url { font-size: 11px; color: var(--muted); }
  .gateway-url input { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 2px 6px; border-radius: 4px; font-size: 11px; width: 240px; }

  /* Main layout */
  main { display: flex; gap: 1px; flex: 1; overflow: hidden; background: var(--border); }
  .pipeline { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: var(--bg); }
  .history { width: 280px; background: var(--bg); padding: 12px; overflow-y: auto; flex-shrink: 0; }

  /* Stage cards */
  .stage { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
  .stage.active { border-color: var(--accent); }
  .stage.done { border-color: var(--ok); }
  .stage.failed { border-color: var(--fail); }
  .stage-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; background: var(--card2); }
  .stage-num { width: 22px; height: 22px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
  .stage.active .stage-num { background: var(--accent); color: #000; }
  .stage.done .stage-num { background: var(--ok); color: #000; }
  .stage-title { font-weight: 600; font-size: 13px; }
  .stage-badge { margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--border); color: var(--muted); font-weight: 600; letter-spacing: 0.04em; }
  .stage-badge.active { background: #00b4c820; color: var(--accent); }
  .stage-badge.done { background: #22c55e20; color: var(--ok); }
  .stage-body { padding: 12px 14px; }

  /* Intent */
  .intent-chip { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; }
  .intent-FETCH_DATA { background: #00b4c820; color: var(--accent); border: 1px solid var(--accent); }
  .intent-FOLLOW_UP { background: #3b82f620; color: var(--http); border: 1px solid var(--http); }
  .intent-CLARIFY { background: #f9731620; color: var(--denied); border: 1px solid var(--denied); }
  .intent-CHITCHAT { background: #8892a420; color: var(--muted); border: 1px solid var(--muted); }
  .meta { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .confidence-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .confidence-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }

  /* Agent grid */
  .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
  .agent-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; transition: all 0.2s; }
  .agent-card.running { border-color: var(--running); background: #60a5fa08; }
  .agent-card.ok { border-color: var(--ok); background: #22c55e08; }
  .agent-card.failed { border-color: var(--fail); background: #ef444408; }
  .agent-card.denied { border-color: var(--denied); background: #f9731608; }
  .agent-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .proto-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.05em; flex-shrink: 0; }
  .proto-http { background: #3b82f630; color: var(--http); }
  .proto-mcp { background: #7c3aed30; color: var(--mcp); }
  .agent-id { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-status { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .latency-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .latency-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease-out; }
  .latency-fill.ok { background: var(--ok); }
  .latency-fill.fail { background: var(--fail); }
  .latency-ms { font-size: 10px; color: var(--muted); margin-top: 3px; text-align: right; }
  .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid var(--border); border-top-color: var(--running); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Entitlement */
  .entitlement-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .entitlement-row:last-child { border-bottom: none; }
  .ent-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .ent-allowed { background: #22c55e30; color: var(--ok); }
  .ent-denied { background: #ef444430; color: var(--fail); }
  .ent-rel { font-size: 11px; font-weight: 600; }
  .ent-reason { font-size: 10px; color: var(--muted); margin-left: auto; }

  /* Summary */
  .summary { display: flex; gap: 16px; }
  .summary-item { text-align: center; }
  .summary-val { font-size: 22px; font-weight: 700; color: var(--accent); }
  .summary-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* History */
  .history h2 { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .hist-item { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.2s; }
  .hist-item:hover { border-color: var(--accent); }
  .hist-item.active { border-color: var(--accent); }
  .hist-prompt { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-meta { font-size: 10px; color: var(--muted); margin-top: 3px; }

  /* Placeholder */
  .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); }
  .placeholder-icon { font-size: 48px; opacity: 0.3; }
  .placeholder-text { font-size: 13px; text-align: center; line-height: 1.6; }
  .placeholder-text strong { color: var(--accent); display: block; font-size: 15px; margin-bottom: 4px; }

  /* Empty state for stages */
  .stage-empty { color: var(--muted); font-size: 12px; font-style: italic; }

  /* Synthesis streaming */
  .synthesis-dots { display: inline-flex; gap: 4px; }
  .synthesis-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: dot-pulse 1.2s infinite; }
  .synthesis-dot:nth-child(2) { animation-delay: 0.2s; }
  .synthesis-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
</style>
</head>
<body>

<header>
  <div class="pulse" id="pulse"></div>
  <h1>Conduit Glass-Box</h1>
  <span style="color:var(--muted);font-size:12px;">Live Decision Trace</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:12px;">
    <span class="gateway-url">
      Gateway: <input type="text" id="gatewayUrl" value="http://localhost:8080" onchange="reconnect()">
    </span>
    <span class="conn-status" id="connStatus">Connecting…</span>
  </div>
</header>

<main>
  <div class="pipeline" id="pipeline">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">◈</div>
      <div class="placeholder-text">
        <strong>Waiting for a request</strong>
        Send a message in Conduit AI (LibreChat) and watch the decision trace appear here in real time.
      </div>
    </div>
  </div>

  <div class="history">
    <h2>Request History</h2>
    <div id="history"></div>
  </div>
</main>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const MAX_HISTORY = 10;
let requests = {};       // requestId → state object
let currentRequestId = null;
let historyList = [];    // [requestId, ...] newest first
let eventSource = null;
let reconnectDelay = 1000;

// ── SSE connection ─────────────────────────────────────────────────────────
function getGatewayUrl() {
  return document.getElementById('gatewayUrl').value.replace(/\/$/, '');
}

function connect() {
  const url = getGatewayUrl() + '/trace/stream';
  eventSource = new EventSource(url);

  eventSource.onopen = () => {
    reconnectDelay = 1000;
    document.getElementById('pulse').className = 'pulse';
    document.getElementById('connStatus').textContent = 'Connected';
  };

  eventSource.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      handleEvent(event);
    } catch(err) {
      console.warn('Parse error:', err, e.data);
    }
  };

  eventSource.onerror = () => {
    document.getElementById('pulse').className = 'pulse offline';
    document.getElementById('connStatus').textContent = 'Reconnecting in ' + (reconnectDelay/1000).toFixed(0) + 's…';
    eventSource.close();
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };
}

function reconnect() {
  if (eventSource) eventSource.close();
  connect();
}

// ── Event handlers ────────────────────────────────────────────────────────
function handleEvent(event) {
  const { type, requestId, timestamp, data } = event;

  if (type === 'request_start') {
    initRequest(requestId, timestamp, data);
    return;
  }

  if (!requests[requestId]) return;
  const req = requests[requestId];

  switch (type) {
    case 'intent_classified':
      req.intent = data;
      break;
    case 'agents_resolved':
      req.agents = {};
      (data.selected || []).forEach(a => {
        req.agents[a.agentId] = { agentId: a.agentId, protocol: a.protocol, score: a.score, status: 'queued' };
      });
      req.filteredAgents = data.filtered || [];
      break;
    case 'entitlement_check':
      if (!req.entitlements) req.entitlements = [];
      req.entitlements.push(data);
      break;
    case 'agent_start':
      if (req.agents && req.agents[data.agentId]) {
        req.agents[data.agentId].status = 'running';
        req.agents[data.agentId].startMs = timestamp;
      }
      break;
    case 'agent_complete':
      if (req.agents && req.agents[data.agentId]) {
        const a = req.agents[data.agentId];
        a.status = data.status;
        a.durationMs = data.durationMs;
        a.dataPreview = data.dataPreview;
      }
      break;
    case 'synthesis_start':
      req.synthesisStart = timestamp;
      req.synthesisData = data;
      break;
    case 'request_complete':
      req.complete = data;
      req.completeTs = timestamp;
      break;
  }

  if (requestId === currentRequestId) render(requestId);
}

function initRequest(requestId, timestamp, data) {
  requests[requestId] = {
    requestId, startTs: timestamp, userId: data.userId,
    prompt: data.prompt, intent: null, agents: null, filteredAgents: [],
    entitlements: [], synthesisStart: null, complete: null,
  };
  historyList = [requestId, ...historyList.slice(0, MAX_HISTORY - 1)];
  currentRequestId = requestId;
  document.getElementById('placeholder').style.display = 'none';
  render(requestId);
  renderHistory();
}

// ── Rendering ──────────────────────────────────────────────────────────────
function render(requestId) {
  const req = requests[requestId];
  if (!req) return;

  const el = document.getElementById('pipeline');
  const maxLatency = req.agents
    ? Math.max(...Object.values(req.agents).map(a => a.durationMs || 0), 1)
    : 1;

  el.innerHTML = `
    ${stageRequest(req)}
    ${stageIntent(req)}
    ${stageRouting(req)}
    ${stageEntitlement(req)}
    ${stageFanout(req, maxLatency)}
    ${stageSynthesis(req)}
    ${req.complete ? stageComplete(req) : ''}
  `;
}

function stageRequest(req) {
  const ts = new Date(req.startTs).toLocaleTimeString();
  return `<div class="stage ${req.complete ? 'done' : 'active'}">
    <div class="stage-header">
      <div class="stage-num">1</div>
      <div class="stage-title">Request Received</div>
      <div class="stage-badge ${req.complete ? 'done' : 'active'}">${req.complete ? 'DONE' : 'IN PROGRESS'}</div>
    </div>
    <div class="stage-body">
      <div class="meta">User: <strong style="color:var(--text)">${escHtml(req.userId || 'anonymous')}</strong> · ${ts}</div>
      <div style="margin-top:8px;font-size:12px;color:var(--text);line-height:1.5;border-left:3px solid var(--accent);padding-left:10px;">
        "${escHtml(req.prompt ? req.prompt.substring(0, 200) : '')}${req.prompt && req.prompt.length > 200 ? '…' : ''}"
      </div>
    </div>
  </div>`;
}

function stageIntent(req) {
  const done = !!req.intent;
  const active = !done && !!req.requestId;
  return `<div class="stage ${done ? 'done' : active ? 'active' : ''}">
    <div class="stage-header">
      <div class="stage-num">2</div>
      <div class="stage-title">Intent Classification</div>
      <div class="stage-badge ${done ? 'done' : ''}">${done ? 'DONE' : 'WAITING'}</div>
    </div>
    <div class="stage-body">
      ${done ? `
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="intent-chip intent-${req.intent.intent}">${req.intent.intent}</span>
          <span class="meta">confidence ${(req.intent.confidence * 100).toFixed(0)}%</span>
        </div>
        <div class="confidence-bar" style="margin-top:8px;">
          <div class="confidence-fill" style="width:${(req.intent.confidence*100).toFixed(0)}%"></div>
        </div>
        ${req.intent.reasoning ? `<div class="meta" style="margin-top:6px;">↳ ${escHtml(req.intent.reasoning)}</div>` : ''}
      ` : `<span class="stage-empty"><span class="spinner"></span> Classifying…</span>`}
    </div>
  </div>`;
}

function stageRouting(req) {
  const done = !!req.agents;
  return `<div class="stage ${done ? 'done' : ''}">
    <div class="stage-header">
      <div class="stage-num">3</div>
      <div class="stage-title">Agent Routing</div>
      <div class="stage-badge ${done ? 'done' : ''}">${done ? Object.keys(req.agents).length + ' selected' : 'WAITING'}</div>
    </div>
    <div class="stage-body">
      ${done ? `
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">
          ${Object.values(req.agents).map(a => `
            <span style="font-size:10px;padding:2px 8px;border-radius:12px;background:${a.protocol==='http'?'#3b82f620':'#7c3aed20'};color:${a.protocol==='http'?'var(--http)':'var(--mcp)'};border:1px solid ${a.protocol==='http'?'var(--http)':'var(--mcp)'};">
              ${escHtml(a.agentId.split('.').pop())} <span style="opacity:0.6">${(a.score*100).toFixed(0)}%</span>
            </span>`).join('')}
        </div>
        ${req.filteredAgents.length > 0 ? `
          <div class="meta">Not selected: ${req.filteredAgents.map(f => `<span style="text-decoration:line-through;opacity:0.5">${escHtml(f.agentId.split('.').pop())}</span>`).join(' ')}</div>
        ` : ''}
      ` : `<span class="stage-empty">Waiting for intent…</span>`}
    </div>
  </div>`;
}

function stageEntitlement(req) {
  const done = req.entitlements && req.entitlements.length > 0;
  const allAllowed = done && req.entitlements.every(e => e.allowed);
  return `<div class="stage ${done ? (allAllowed ? 'done' : 'failed') : ''}">
    <div class="stage-header">
      <div class="stage-num">4</div>
      <div class="stage-title">Entitlement Gate</div>
      <div class="stage-badge ${done ? (allAllowed ? 'done' : 'active') : ''}">${done ? (allAllowed ? 'ALLOWED' : 'DENIED') : 'WAITING'}</div>
    </div>
    <div class="stage-body">
      ${done ? req.entitlements.map(e => `
        <div class="entitlement-row">
          <div class="ent-icon ${e.allowed ? 'ent-allowed' : 'ent-denied'}">${e.allowed ? '✓' : '✗'}</div>
          <div class="ent-rel">${escHtml(e.relationshipId || 'unknown')}</div>
          <div class="ent-reason">${escHtml(e.reason || (e.allowed ? 'in book' : 'not in book'))}</div>
        </div>`).join('') : `<span class="stage-empty">Waiting for routing…</span>`}
    </div>
  </div>`;
}

function stageFanout(req, maxLatency) {
  const hasAgents = !!req.agents;
  const anyComplete = hasAgents && Object.values(req.agents).some(a => a.status === 'ok' || a.status === 'failed' || a.status === 'denied');
  const allComplete = hasAgents && Object.values(req.agents).every(a => a.status !== 'queued' && a.status !== 'running');

  return `<div class="stage ${allComplete ? 'done' : hasAgents ? 'active' : ''}">
    <div class="stage-header">
      <div class="stage-num">5</div>
      <div class="stage-title">Agent Fan-out</div>
      <div class="stage-badge ${allComplete ? 'done' : hasAgents ? 'active' : ''}">${hasAgents ? Object.keys(req.agents).length + ' agents' : 'WAITING'}</div>
    </div>
    <div class="stage-body">
      ${hasAgents ? `<div class="agent-grid">
        ${Object.values(req.agents).map(a => {
          const pct = a.durationMs ? Math.min(100, (a.durationMs / maxLatency) * 100) : 0;
          const color = a.status === 'ok' ? 'var(--ok)' : a.status === 'failed' ? 'var(--fail)' : a.status === 'denied' ? 'var(--denied)' : 'var(--running)';
          const icon = a.status === 'ok' ? '✓' : a.status === 'failed' ? '✗' : a.status === 'denied' ? '⊘' : '';
          return `<div class="agent-card ${a.status}">
            <div class="agent-header">
              <span class="proto-badge proto-${a.protocol}">${(a.protocol||'http').toUpperCase()}</span>
              <span class="agent-id" title="${escHtml(a.agentId)}">${escHtml(a.agentId.split('.').pop())}</span>
              ${icon ? `<span style="margin-left:auto;color:${color};font-weight:700;">${icon}</span>` : `<span class="spinner" style="margin-left:auto;"></span>`}
            </div>
            <div class="agent-status" style="color:${color}">${a.status}</div>
            ${a.durationMs ? `
              <div class="latency-bar"><div class="latency-fill ${a.status}" style="width:${pct.toFixed(0)}%;background:${color}"></div></div>
              <div class="latency-ms">${a.durationMs}ms</div>
            ` : ''}
          </div>`;
        }).join('')}
      </div>` : `<span class="stage-empty">Waiting for entitlement…</span>`}
    </div>
  </div>`;
}

function stageSynthesis(req) {
  const active = !!req.synthesisStart;
  const done = !!req.complete;
  return `<div class="stage ${done ? 'done' : active ? 'active' : ''}">
    <div class="stage-header">
      <div class="stage-num">6</div>
      <div class="stage-title">Answer Synthesis</div>
      <div class="stage-badge ${done ? 'done' : active ? 'active' : ''}">${done ? 'COMPLETE' : active ? 'STREAMING' : 'WAITING'}</div>
    </div>
    <div class="stage-body">
      ${active && !done ? `<div style="display:flex;align-items:center;gap:8px;"><div class="synthesis-dots"><div class="synthesis-dot"></div><div class="synthesis-dot"></div><div class="synthesis-dot"></div></div><span class="meta">Synthesizing from ${req.synthesisData ? req.synthesisData.successCount : '?'} sources…</span></div>` :
        done ? `<span style="color:var(--ok);font-weight:600;">✓ Answer streamed to client</span>` :
        `<span class="stage-empty">Waiting for fan-out…</span>`}
    </div>
  </div>`;
}

function stageComplete(req) {
  const ok = Object.values(req.agents || {}).filter(a => a.status === 'ok').length;
  const total = Object.keys(req.agents || {}).length;
  return `<div class="stage done" style="border-color:var(--ok);">
    <div class="stage-header" style="background:var(--ok)10;">
      <div class="stage-num" style="background:var(--ok);color:#000;">✓</div>
      <div class="stage-title">Request Complete</div>
      <div class="stage-badge done">${req.complete.totalMs}ms total</div>
    </div>
    <div class="stage-body">
      <div class="summary">
        <div class="summary-item"><div class="summary-val">${req.complete.totalMs}<span style="font-size:12px;font-weight:400;">ms</span></div><div class="summary-label">Total Latency</div></div>
        <div class="summary-item"><div class="summary-val">${ok}/${total}</div><div class="summary-label">Agents Succeeded</div></div>
        <div class="summary-item"><div class="summary-val" style="font-size:14px;color:var(--ok)">DONE</div><div class="summary-label">Streamed to Chat</div></div>
      </div>
    </div>
  </div>`;
}

// ── History panel ──────────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('history');
  el.innerHTML = historyList.map(rid => {
    const req = requests[rid];
    if (!req) return '';
    const ts = new Date(req.startTs).toLocaleTimeString();
    const ms = req.complete ? req.complete.totalMs + 'ms' : 'in progress';
    return `<div class="hist-item ${rid === currentRequestId ? 'active' : ''}" onclick="showRequest('${rid}')">
      <div class="hist-prompt">${escHtml(req.prompt ? req.prompt.substring(0, 60) : '')}${req.prompt && req.prompt.length > 60 ? '…' : ''}</div>
      <div class="hist-meta">${ts} · ${ms} · ${req.userId || 'anon'}</div>
    </div>`;
  }).join('');
}

function showRequest(requestId) {
  currentRequestId = requestId;
  render(requestId);
  renderHistory();
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ───────────────────────────────────────────────────────────────────
connect();
setInterval(renderHistory, 2000);  // keep history timestamps fresh
</script>
