apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: domain
  # ── Axiom Story B2: base scope ────────────────────────────────────────────────
  # BASE scope (root) = ceiling; per-tenant narrowing lives in tenant_default_domain.yaml.
  # scopePermissions unset ⇒ Cerbos default OVERRIDE_PARENT (root has no parent — ADR F0;
  # explicit set on multiple roots false-conflicts on 0.53). Byte-identical to pre-migration.
  scope: ""
  importDerivedRoles:
    - business_derived_roles

  # Governs administrative operations on an org-domain (e.g. "wealth-private-banking").
  #
  # Resource: domain ID matches the org-domain name (e.g. R.id == "wealth-private-banking")
  # Principal attributes:
  #   P.attr.admin_domains — org domains this caller administers
  #   P.attr.domains       — org domains this caller is a member of

  rules:

    # ── platform_admin: full control over every domain ───────────────────────────
    # CROSS-TENANT SUPERUSER (B2.3 allowlist): intentionally raw / cross-tenant.
    - actions: ["view", "create", "update", "delete", "manage_members", "add_member", "remove_member"]
      effect: EFFECT_ALLOW
      roles: ["platform_admin"]

    # ── domain_admin: can view and manage membership in their own domains ────────
    - actions: ["view", "manage_members", "add_member", "remove_member"]
      effect: EFFECT_ALLOW
      derivedRoles: ["tenant_domain_admin"]   # domain_admin + tenant-equality backstop (B2.3)
      condition:
        match:
          expr: P.attr.admin_domains.exists(d, d == R.id)

    # ── chat_user: can view domains they belong to (read-only) ───────────────────
    #    relationship_manager kept as an alias during the chat_user migration.
    - actions: ["view"]
      effect: EFFECT_ALLOW
      derivedRoles: ["tenant_chat_user"]      # chat_user/relationship_manager + tenant-equality backstop (B2.3)
      condition:
        match:
          expr: P.attr.domains.exists(d, d == R.id)
