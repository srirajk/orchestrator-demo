apiVersion: api.cerbos.dev/v1
# ── Conduit Insights admin gate ──────────────────────────────────────────────
# Governs the native analytics API (GET /v1/insights/*). ADDITIVE: a brand-new
# resource kind ("insights"); it changes no existing agent/relationship/iam decision.
#
# The gateway's InsightsAuthorizer issues a CheckResources call:
#   principal: the caller (roles from the verified JWT)
#   resource : kind=insights, id=insights, action=read
#
# Allow only administrators. A chat_user carries none of these roles, so the implicit
# default-deny returns EFFECT_DENY → the gateway responds 403. The role→allow mapping
# lives HERE in policy, not in gateway Java.
resourcePolicy:
  version: "default"
  resource: insights
  # ── Axiom Story B2: base scope ────────────────────────────────────────────────
  # BASE scope (root) = ceiling; per-tenant narrowing lives in tenant_default_insights.yaml.
  # scopePermissions unset ⇒ Cerbos default OVERRIDE_PARENT (root has no parent — ADR F0;
  # explicit set on multiple roots false-conflicts on 0.53). Byte-identical to pre-migration.
  scope: ""
  importDerivedRoles:
    - business_derived_roles

  rules:
    # Platform administrators: full access (superuser across the platform).
    # CROSS-TENANT SUPERUSER (B2.3 allowlist): intentionally raw / cross-tenant.
    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["platform_admin"]

    # Dedicated Insights administrators (conduit_admin) — the least-privilege role that
    # grants analytics access without any other platform_admin capability.
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["tenant_conduit_admin"]   # conduit_admin + tenant-equality backstop (B2.3)

    # No explicit deny needed — Cerbos denies by default (a chat_user hits the implicit deny).
