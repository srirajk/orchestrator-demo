apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: agent
  rules:
    # All authenticated roles may invoke read-only agents if clearance is sufficient
    - actions: ["invoke"]
      effect: EFFECT_ALLOW
      roles: ["relationship_manager", "domain_admin", "platform_admin", "admin"]
      condition:
        match:
          all:
            of:
              - expr: R.attr.is_mutating == false
              - expr: int(P.attr.clearance) >= int(R.attr.required_clearance)
