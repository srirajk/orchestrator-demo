apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: relationship
  rules:
    # chat_user (runtime front door) and domain_admin: structural access allowed.
    # Book-of-business check (does this user actually cover this client?) is enforced
    # by the domain coverage service (DISCOVER/CHECK) before fan-out — not by Cerbos.
    # relationship_manager kept as an alias during the chat_user migration.
    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["chat_user", "relationship_manager"]

    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["domain_admin"]

    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["platform_admin"]
    # NOTE: a bare "admin" role rule was removed here — no principal/IAM seed ever
    # grants "admin"; the real platform super-role is platform_admin (above). Keeping
    # a rule for a role that is defined/seeded nowhere is dead grant surface.
