apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: relationship
  rules:
    # relationship_manager and domain_admin: structural access allowed.
    # Book-of-business check (does this RM actually cover this client?) is enforced
    # by the domain coverage service (DISCOVER/CHECK) before fan-out — not by Cerbos.
    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["relationship_manager"]

    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["domain_admin"]

    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["platform_admin"]

    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["admin"]
