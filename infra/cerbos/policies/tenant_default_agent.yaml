apiVersion: api.cerbos.dev/v1
# ═════════════════════════════════════════════════════════════════════════════
# TENANT "default" — TOTAL child for resource `agent`  (Axiom Story B2.6)
# ═════════════════════════════════════════════════════════════════════════════
# The `default` tenant reproduces TODAY's decisions. Under REQUIRE_PARENTAL_CONSENT_FOR_
# ALLOWS the EFFECTIVE decision for any tuple = (child ALLOW) AND (base ceiling ALLOW).
# Every ceiling (action, role) tuple below is granted UNCONDITIONALLY here, so the base
# policy's conditions (classification ladder, admin_domains, tenant-equality backstop)
# remain the sole gate — a scope:"default" request resolves identically to the base
# (empirically: cerbos-parity-matrix.py, scope="" vs scope="default", 0 diffs).
#
# TOTALITY (B2.6): this child covers EVERY base-allowed (action, role) tuple — no tuple is
# silent, so nothing fall-throughs to an unintended parent ALLOW. scripts/cerbos-tenant-
# totality-lint.py (extended to expand derivedRoles→parentRoles) fails CI on any gap.
# A FRESH tenant instead starts from infra/cerbos/templates/tenant-deny-all.yaml (deny-all).
resourcePolicy:
  version: "default"
  resource: agent
  scope: "default"
  scopePermissions: SCOPE_PERMISSIONS_REQUIRE_PARENTAL_CONSENT_FOR_ALLOWS
  rules:
    # platform_admin (cross-tenant superuser) — every agent action.
    - actions: ["invoke", "invoke_membership", "register", "deregister"]
      effect: EFFECT_ALLOW
      roles: ["platform_admin"]
    # domain_admin — same action surface (base gates on admin_domains + tenant equality).
    - actions: ["invoke", "invoke_membership", "register", "deregister"]
      effect: EFFECT_ALLOW
      roles: ["domain_admin"]
    # chat_user / relationship_manager — invoke + membership probe (base gates on the
    # classification ladder + tenant equality).
    - actions: ["invoke", "invoke_membership"]
      effect: EFFECT_ALLOW
      roles: ["chat_user", "relationship_manager"]
