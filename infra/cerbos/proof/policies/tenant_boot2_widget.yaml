apiVersion: api.cerbos.dev/v1
# в”Ђв”Ђ TENANT "boot2" вЂ” same template, ONE grant added в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# `view` moved from the withheld (DENY) bucket to the granted (ALLOW) bucket.
# `edit` stays explicitly withheld. Probe `denyAllTemplateDeniesUntilGranted`
# (after) expects view = ALLOW, edit = DENY.
resourcePolicy:
  version: "default"
  resource: widget
  scope: "boot2"
  scopePermissions: SCOPE_PERMISSIONS_REQUIRE_PARENTAL_CONSENT_FOR_ALLOWS
  rules:
    # Granted bucket вЂ” explicit ALLOW (parent ceiling also allows в†’ effective ALLOW).
    - actions: ["view"]
      effect: EFFECT_ALLOW
      roles: ["user"]
    # Withheld bucket вЂ” remaining ceiling tuples stay explicitly DENIED (no fall-through).
    - actions: ["edit"]
      effect: EFFECT_DENY
      roles: ["user"]
