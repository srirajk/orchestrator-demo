server:
  httpListenAddr: ":3592"
  grpcListenAddr: ":3593"
storage:
  driver: disk
  disk:
    directory: /conf/policies
    watchForChanges: true
audit:
  enabled: true
  backend: file
  file:
    path: /var/log/cerbos/audit.log
  accessLogsEnabled: true
  decisionLogFilters:
    checkResources:
      ignoreAllowAll: false
