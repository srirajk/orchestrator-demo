receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  batch:
    timeout: 1s
    send_batch_size: 512

  # Enrich every span with service metadata
  resource:
    attributes:
      - key: environment
        value: "demo"
        action: upsert

exporters:
  # Traces → Tempo
  otlp_grpc/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Traces + Evals → Arize Phoenix (OTLP/HTTP on port 6006)
  # Note: otlp_http exporter appends /v1/traces — endpoint is the base URL only
  otlp_http/phoenix:
    endpoint: "http://phoenix:6006"
    tls:
      insecure: true

  # Metrics → Prometheus (scraped from :8889/metrics)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: meridian

  # Debug (structured JSON to stdout — helpful during dev)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp_grpc/tempo, otlp_http/phoenix, debug]

    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheus]
