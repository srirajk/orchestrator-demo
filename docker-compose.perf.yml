# Performance-testing overlay.
#
#   docker compose -p orchestrator-demo -f docker-compose.yml -f docker-compose.perf.yml up -d
#
# Repoints every LLM call site — the gateway's four, and the servicing agents' internal one — at
# the stub-llm cassette proxy. Nothing in the base stack changes, and no gateway code changes:
# every call site is already env-configurable (CONDUIT_LLM_<SITE>_BASE_URL). That is the World-B
# seam doing its job.
#
# Record once (costs a handful of real completions), then replay for free, forever:
#
#   STUB_MODE=record  docker compose ... up -d stub-llm && <drive the load-test prompts once>
#   STUB_MODE=replay  docker compose ... up -d stub-llm && <run the load test>
#
# STUB_LATENCY_MS is the independent variable. Hold the gateway fixed, vary latency, and you are
# measuring the gateway rather than the provider's rate limiter.

services:
  stub-llm:
    build:
      context: ./mock-agents/stub-llm
      dockerfile: Dockerfile
    container_name: conduit-stub-llm
    ports:
      # 8090 on the host is taken by cadvisor; in-network the stub stays at stub-llm:8090.
      - "8092:8090"
    environment:
      STUB_MODE: ${STUB_MODE:-replay}
      STUB_LATENCY_MS: ${STUB_LATENCY_MS:-0}
      STUB_JITTER_MS: ${STUB_JITTER_MS:-0}
      STUB_CASSETTE: /cassettes/cassette.json
      # Only consulted in record/passthru mode.
      STUB_UPSTREAM_BASE_URL: ${STUB_UPSTREAM_BASE_URL:-https://api.openai.com/v1}
      STUB_UPSTREAM_API_KEY: ${STUB_UPSTREAM_API_KEY:-${OPENAI_API_KEY:-}}
    volumes:
      - ./mock-agents/stub-llm/cassettes:/cassettes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    environment:
      CONDUIT_LLM_INTENT_CLASSIFIER_BASE_URL: http://stub-llm:8090/v1
      CONDUIT_LLM_ENTITY_EXTRACTOR_BASE_URL: http://stub-llm:8090/v1
      CONDUIT_LLM_SYNTHESIZER_BASE_URL: http://stub-llm:8090/v1
      CONDUIT_LLM_CLARIFICATION_COMPOSER_BASE_URL: http://stub-llm:8090/v1
    depends_on:
      stub-llm:
        condition: service_healthy

  servicing-mcp:
    environment:
      SERVICING_AGENT_LLM_BASE_URL: http://stub-llm:8090/v1
    depends_on:
      stub-llm:
        condition: service_healthy
