apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: agent
  scope: acme-expired
  scopePermissions: SCOPE_PERMISSIONS_REQUIRE_PARENTAL_CONSENT_FOR_ALLOWS
  rules:
  - actions:
    - register
    effect: EFFECT_ALLOW
    roles:
    - platform_admin
    condition:
      match:
        expr: now() >= timestamp("2026-07-18T02:12:57Z") && now() < timestamp("2026-07-18T02:12:56Z")
  - actions:
    - register
    effect: EFFECT_DENY
    roles:
    - platform_admin
    condition:
      match:
        expr: now() < timestamp("2026-07-18T02:12:57Z") || now() >= timestamp("2026-07-18T02:12:56Z")
  - actions:
    - invoke
    - invoke_membership
    effect: EFFECT_ALLOW
    roles:
    - chat_user
  - actions:
    - deregister
    - invoke
    - invoke_membership
    - register
    effect: EFFECT_ALLOW
    roles:
    - domain_admin
  - actions:
    - deregister
    - invoke
    - invoke_membership
    effect: EFFECT_ALLOW
    roles:
    - platform_admin
  - actions:
    - invoke
    - invoke_membership
    effect: EFFECT_ALLOW
    roles:
    - relationship_manager
