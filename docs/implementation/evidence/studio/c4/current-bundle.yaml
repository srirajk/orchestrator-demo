apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: agent
  scope: acme
  scopePermissions: SCOPE_PERMISSIONS_REQUIRE_PARENTAL_CONSENT_FOR_ALLOWS
  rules:
  - actions:
    - invoke
    - invoke_membership
    - register
    - deregister
    effect: EFFECT_DENY
    roles:
    - platform_admin
