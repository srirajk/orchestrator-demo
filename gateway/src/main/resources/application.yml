spring:
  application:
    name: conduit-gateway
  threads:
    virtual:
      enabled: true   # Java 21+ GA virtual threads; Java 25 adds JEP-491 (no synchronized pinning)

server:
  port: 8080
  tomcat:
    threads:
      min-spare: 5
      max: 50   # virtual threads handle real concurrency; Tomcat pool is just the acceptor

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  # Percentile histograms → so histogram_quantile() latency panels (p50/p95/p99) render.
  # http.* are Spring's server/client request timers; intent.classify.duration is our custom timer.
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true
        intent.classify.duration: true
  # Micrometer → OTel bridge: exports traces to the OTel Collector
  tracing:
    enabled: true
    sampling:
      probability: 1.0   # 100% sampling in the demo; tune down in production
  # OTLP trace export
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

conduit:
  # ── Assistant framing (World B) ───────────────────────────────────────────────
  # Domain-neutral defaults. A domain deployment overrides these to reskin the
  # assistant; the gateway carries no hardcoded domain copy. domain-context feeds the
  # intent-classifier opener + the history-only synthesis prompt; display-name names
  # the answer synthesizer's identity.
  assistant:
    domain-context: ${CONDUIT_ASSISTANT_DOMAIN_CONTEXT:an enterprise data assistant for relationship managers}
    display-name: ${CONDUIT_ASSISTANT_DISPLAY_NAME:Meridian}
  auth:
    jwks-url: ${CONDUIT_AUTH_JWKS_URL:http://iam-service:8084/.well-known/jwks.json}
    # Comma-separated list of accepted JWT issuers.
    # Includes the Axiom (iam-service) issuer URL variants used in dev/docker.
    required-issuers: ${CONDUIT_AUTH_REQUIRED_ISSUERS:http://host.docker.internal:8084,http://iam-service:8084,http://localhost:8084}
    required-audience: conduit-gateway
  embedding:
    provider: ${CONDUIT_EMBEDDING_PROVIDER:hash}   # hash | remote
    dimension: ${CONDUIT_EMBEDDING_DIMENSION:384}
    model: ${CONDUIT_EMBEDDING_MODEL:all-MiniLM-L6-v2}
    remote:
      url: ${CONDUIT_EMBEDDING_REMOTE_URL:http://localhost:8083/v1/embeddings}
  resolver:
    confidence-floor: 0.30       # absolute cosine similarity floor
    relative-floor-factor: 0.65  # dynamic floor = max(absolute, topScore * factor); prunes long-tail matches
    top-k: 10
    # Domain-neutral entity-resolution endpoint (legacy fallback resolver; the live World-B path
    # resolves via CoverageClient using the manifest's coverage.resolve_url). No domain literal.
    entity-resolve-url: ${CONDUIT_RESOLVER_ENTITY_RESOLVE_URL:http://mock-crm:8085/entities/resolve}
  llm:
    # ── Intent Classifier (classification + routing) ──────────────────────────
    # Default: Z.AI GLM (fast flash model for low-latency classification).
    # Override per-client via CONDUIT_LLM_*_BASE_URL / MODEL / API_KEY env vars.
    # To use OpenAI: set CONDUIT_LLM_*_BASE_URL=https://api.openai.com/v1 + OPENAI_API_KEY.
    intent-classifier:
      base-url: ${CONDUIT_LLM_INTENT_CLASSIFIER_BASE_URL:https://api.z.ai/api/paas/v4}
      api-key: ${CONDUIT_LLM_INTENT_CLASSIFIER_API_KEY:${ZAI_API_KEY:}}
      model: ${CONDUIT_LLM_INTENT_CLASSIFIER_MODEL:glm-4.5-flash}
      # Intent classification runs synchronously before the first SSE byte, so it gets its own
      # bounded latency budget (~20s worst case) — independent of the (streamed) synthesizer's
      # conduit.llm.* budget, which could otherwise burn ~81s (3 retries × 25s + backoff).
      max-retries: ${CONDUIT_LLM_INTENT_CLASSIFIER_MAX_RETRIES:2}
      retry-initial-delay-ms: ${CONDUIT_LLM_INTENT_CLASSIFIER_RETRY_INITIAL_DELAY_MS:200}
      retry-backoff-multiplier: ${CONDUIT_LLM_INTENT_CLASSIFIER_RETRY_BACKOFF_MULTIPLIER:2}
      request-timeout-seconds: ${CONDUIT_LLM_INTENT_CLASSIFIER_REQUEST_TIMEOUT_SECONDS:10}
    # ── Entity Extractor (pull relationship/fund/ticker from user prompt) ─────
    entity-extractor:
      base-url: ${CONDUIT_LLM_ENTITY_EXTRACTOR_BASE_URL:https://api.z.ai/api/paas/v4}
      api-key: ${CONDUIT_LLM_ENTITY_EXTRACTOR_API_KEY:${ZAI_API_KEY:}}
      model: ${CONDUIT_LLM_ENTITY_EXTRACTOR_MODEL:glm-4.5-flash}
    # ── Answer Synthesizer (grounded streaming answer) ────────────────────────
    synthesizer:
      base-url: ${CONDUIT_LLM_SYNTHESIZER_BASE_URL:https://api.z.ai/api/paas/v4}
      api-key: ${CONDUIT_LLM_SYNTHESIZER_API_KEY:${ZAI_API_KEY:}}
      model: ${CONDUIT_LLM_SYNTHESIZER_MODEL:glm-4.6}
    # Set to true to stream the model's chain-of-thought as a blockquote before the answer
    show-reasoning: ${CONDUIT_LLM_SHOW_REASONING:false}
    max-retries: ${CONDUIT_LLM_MAX_RETRIES:3}
    retry-initial-delay-ms: ${CONDUIT_LLM_RETRY_INITIAL_DELAY_MS:2000}
    retry-backoff-multiplier: ${CONDUIT_LLM_RETRY_BACKOFF_MULTIPLIER:2}
    request-timeout-seconds: ${CONDUIT_LLM_REQUEST_TIMEOUT_SECONDS:25}
  orchestration:
    fan-out-deadline-ms: ${CONDUIT_FANOUT_DEADLINE_MS:60000}
    harness:
      default-sla-ms: ${CONDUIT_HARNESS_DEFAULT_SLA_MS:5000}
      bulkhead:
        max-concurrent: ${CONDUIT_HARNESS_BULKHEAD_MAX_CONCURRENT:5}
        queue-capacity: ${CONDUIT_HARNESS_BULKHEAD_QUEUE_CAPACITY:20}
      circuit-breaker:
        failure-rate-threshold: ${CONDUIT_CB_FAILURE_RATE_THRESHOLD:50}
        slow-call-rate-threshold: ${CONDUIT_CB_SLOW_CALL_RATE_THRESHOLD:80}
        slow-call-duration-seconds: ${CONDUIT_CB_SLOW_CALL_DURATION_SECONDS:10}
        open-wait-seconds: ${CONDUIT_CB_OPEN_WAIT_SECONDS:30}
        sliding-window-size: ${CONDUIT_CB_SLIDING_WINDOW_SIZE:10}
        min-calls: ${CONDUIT_CB_MIN_CALLS:3}
        half-open-permitted-calls: ${CONDUIT_CB_HALF_OPEN_PERMITTED_CALLS:2}
  telemetry:
    trace-ttl-seconds: ${CONDUIT_TELEMETRY_TRACE_TTL_SECONDS:86400}
  session:
    ttl-seconds: ${CONDUIT_SESSION_TTL_SECONDS:1800}   # 30 min idle expiry
  authz:
    # Cerbos resource kind for entity-level checks (e.g. relationship, account, deal).
    # Domain teams declare this; the gateway carries no hardcoded domain literal (World B).
    resource-type: ${CONDUIT_AUTHZ_RESOURCE_TYPE:relationship}
  coverage:
    wealth-management:
      url: ${WEALTH_COVERAGE_URL:http://wealth-coverage:8086}
  cerbos:
    host: ${CERBOS_HOST:localhost}
    http-port: ${CERBOS_HTTP_PORT:3592}
    # closed (default) = Cerbos unreachable → deny all (production safe)
    # local = Cerbos unreachable → fall back to JWT book claim (demo resilience)
    fail-mode: ${CONDUIT_CERBOS_FAIL_MODE:closed}
  # ── Conduit Insights (native, admin-gated analytics API) ──────────────────────
  # Aggregates Prometheus (ops) + Langfuse (cost/eval) behind /v1/insights/*.
  # No hardcoded endpoints/keys — everything via env. In docker the gateway reaches
  # Prometheus at prometheus:9090 and Langfuse at langfuse:3000 (internal port).
  insights:
    prometheus-url: ${CONDUIT_INSIGHTS_PROMETHEUS_URL:http://prometheus:9090}
    langfuse-url: ${CONDUIT_INSIGHTS_LANGFUSE_URL:http://langfuse:3000}
    langfuse-public-key: ${CONDUIT_INSIGHTS_LANGFUSE_PUBLIC_KEY:${LANGFUSE_PROJECT_PUBLIC_KEY:}}
    langfuse-secret-key: ${CONDUIT_INSIGHTS_LANGFUSE_SECRET_KEY:${LANGFUSE_PROJECT_SECRET_KEY:}}
    # VT fan-out discipline: dedicated bounded executor, deadline-bound board, per-query timeout,
    # backpressure to the upstreams, and a short-TTL cache on the (slower) Langfuse side.
    board-deadline-ms: ${CONDUIT_INSIGHTS_BOARD_DEADLINE_MS:4000}
    per-query-timeout-ms: ${CONDUIT_INSIGHTS_PER_QUERY_TIMEOUT_MS:3000}
    connect-timeout-ms: ${CONDUIT_INSIGHTS_CONNECT_TIMEOUT_MS:2000}
    max-concurrent-queries: ${CONDUIT_INSIGHTS_MAX_CONCURRENT_QUERIES:8}
    permit-wait-ms: ${CONDUIT_INSIGHTS_PERMIT_WAIT_MS:2000}
    cache-ttl-seconds: ${CONDUIT_INSIGHTS_CACHE_TTL_SECONDS:20}
  # ── LLM token pricing (config-driven cost analytics) ──────────────────────────
  # registry/model-prices.json is the SINGLE source of pricing truth. The insights module
  # multiplies Langfuse's per-model token counts by these rates ITSELF, so cost is correct even
  # when Langfuse's own model-pricing was never seeded. No prices are hardcoded in Java (World B).
  # In docker the registry is mounted at /registry (CONDUIT_REGISTRY_LOCATION=file:/registry/).
  pricing:
    config-path: ${CONDUIT_PRICING_CONFIG_PATH:file:/registry/model-prices.json}
    reload-check-ms: ${CONDUIT_PRICING_RELOAD_CHECK_MS:10000}

logging:
  pattern:
    # Include MDC keys (requestId, conversationId, userId) in every log line
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [rid=%X{requestId} cid=%X{conversationId} uid=%X{userId}] - %msg%n"
  level:
    ai.conduit: DEBUG
    org.springframework.web: INFO
    io.opentelemetry: WARN
