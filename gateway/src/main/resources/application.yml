spring:
  application:
    name: meridian-gateway
  threads:
    virtual:
      enabled: true   # Java 21+ GA virtual threads; Java 25 adds JEP-491 (no synchronized pinning)

server:
  port: 8080
  tomcat:
    threads:
      min-spare: 5
      max: 50   # virtual threads handle real concurrency; Tomcat pool is just the acceptor

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  # Micrometer → OTel bridge: exports traces to the OTel Collector
  tracing:
    enabled: true
    sampling:
      probability: 1.0   # 100% sampling in the demo; tune down in production
  # OTLP trace export
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

meridian:
  embedding:
    provider: ${MERIDIAN_EMBEDDING_PROVIDER:hash}   # hash | remote
    dimension: ${MERIDIAN_EMBEDDING_DIMENSION:384}
    model: ${MERIDIAN_EMBEDDING_MODEL:all-MiniLM-L6-v2}
    remote:
      url: ${MERIDIAN_EMBEDDING_REMOTE_URL:http://localhost:8083/v1/embeddings}
  resolver:
    confidence-floor: 0.30       # absolute cosine similarity floor
    relative-floor-factor: 0.65  # dynamic floor = max(absolute, topScore * factor); prunes long-tail matches
    top-k: 10
  llm:
    base-url: ${MERIDIAN_LLM_BASE_URL:https://api.z.ai/api/paas/v4}
    api-key: ${ZAI_API_KEY:}
    # Fast/cheap model for intent classification and entity extraction (target p99 < 300ms)
    intent-model: ${MERIDIAN_LLM_INTENT_MODEL:glm-4.5-flash}
    extraction-model: ${MERIDIAN_LLM_EXTRACTION_MODEL:glm-4.5-flash}
    # Quality model for answer synthesis (streamed, grounded)
    synthesis-model: ${MERIDIAN_LLM_SYNTHESIS_MODEL:glm-4.5-flash}
    # Set to true to stream model reasoning (chain-of-thought) as a blockquote before the answer
    show-reasoning: ${MERIDIAN_LLM_SHOW_REASONING:false}
  session:
    ttl-seconds: ${MERIDIAN_SESSION_TTL_SECONDS:1800}   # 30 min idle expiry
  cerbos:
    host: ${CERBOS_HOST:localhost}
    http-port: ${CERBOS_HTTP_PORT:3592}

logging:
  pattern:
    # Include MDC keys (requestId, conversationId, userId) in every log line
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [rid=%X{requestId} cid=%X{conversationId} uid=%X{userId}] - %msg%n"
  level:
    ai.meridian: DEBUG
    org.springframework.web: INFO
    io.opentelemetry: WARN
