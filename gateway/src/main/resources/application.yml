spring:
  application:
    name: conduit-gateway
  threads:
    virtual:
      enabled: true   # Java 21+ GA virtual threads; Java 25 adds JEP-491 (no synchronized pinning)

server:
  port: 8080
  tomcat:
    threads:
      min-spare: 5
      max: 50   # virtual threads handle real concurrency; Tomcat pool is just the acceptor

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  # Percentile histograms → so histogram_quantile() latency panels (p50/p95/p99) render.
  # http.* are Spring's server/client request timers; intent.classify.duration is our custom timer.
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true
        intent.classify.duration: true
        conduit.gateway.request.duration: true
        conduit.gateway.stage.duration: true
        conduit.fanout.duration: true
        agent.latency: true
  # Micrometer → OTel bridge: exports traces to the OTel Collector
  tracing:
    enabled: true
    sampling:
      probability: 1.0   # 100% sampling in the demo; tune down in production
  # OTLP trace export
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

conduit:
  # Regulator-facing audit: one immutable record per request to WORM object storage, off the
  # request path (see docs/specs/AUDIT-RECORD-SPEC.md). Disabled by default; the demo enables it
  # via env pointing at MinIO. Analytics (Iceberg/ClickHouse) read these objects later.
  audit:
    enabled: ${CONDUIT_AUDIT_ENABLED:false}
    retention-days: ${CONDUIT_AUDIT_RETENTION_DAYS:2555}
    object-lock-mode: ${CONDUIT_AUDIT_OBJECT_LOCK_MODE:COMPLIANCE}   # COMPLIANCE | GOVERNANCE | none
    store:
      type: ${CONDUIT_AUDIT_STORE_TYPE:s3}                          # s3-family (MinIO/S3/R2) | adls-gen2 (later)
      bucket: ${CONDUIT_AUDIT_BUCKET:conduit-audit}
      prefix: ${CONDUIT_AUDIT_PREFIX:audit}
      endpoint: ${CONDUIT_AUDIT_S3_ENDPOINT:}                       # blank = real AWS
      region: ${CONDUIT_AUDIT_S3_REGION:us-east-1}
      path-style: ${CONDUIT_AUDIT_S3_PATH_STYLE:true}               # true for MinIO
      access-key: ${CONDUIT_AUDIT_S3_ACCESS_KEY:}
      secret-key: ${CONDUIT_AUDIT_S3_SECRET_KEY:}
  gateway:
    version: ${CONDUIT_GATEWAY_VERSION:0.1.0}
  # End-to-end deadline for ONE chat turn. The SSE emitter times out here AND the pipeline
  # future is cancelled — so a turn can neither run forever, nor keep running (and keep
  # spending) for a client that has already disconnected. Was a hardcoded 120_000L.
  request:
    deadline-ms: ${CONDUIT_REQUEST_DEADLINE_MS:90000}

  # ── Assistant framing (World B) ───────────────────────────────────────────────
  # domain-context is an OPTIONAL explicit override for the classifier opener + history-only
  # synthesis prompt. Left BLANK by default: the gateway then COMPOSES the framing from the
  # loaded domain manifests' domain_context phrases (DomainManifestStore.composedDomainContext),
  # falling back to a domain-neutral default when none declare one. Set it only to force a
  # specific framing. The gateway carries no hardcoded domain copy. display-name names the
  # answer synthesizer's identity.
  assistant:
    domain-context: ${CONDUIT_ASSISTANT_DOMAIN_CONTEXT:}
    display-name: ${CONDUIT_ASSISTANT_DISPLAY_NAME:Meridian}
  auth:
    jwks-url: ${CONDUIT_AUTH_JWKS_URL:http://iam-service:8084/.well-known/jwks.json}
    # Comma-separated list of accepted JWT issuers.
    # Includes the Axiom (iam-service) issuer URL variants used in dev/docker.
    required-issuers: ${CONDUIT_AUTH_REQUIRED_ISSUERS:http://host.docker.internal:8084,http://iam-service:8084,http://localhost:8084}
    required-audience: conduit-gateway
  # ── MCP transport (World B: version comes from config/manifest, never Java) ────
  # Conduit's MCP client speaks Streamable HTTP (single /mcp endpoint) by default. The
  # negotiated protocol version is sent on `initialize` and echoed on every `tools/call`.
  # A manifest may override per-agent via connection.protocol_version. The legacy HTTP+SSE
  # transport is only used for agents that explicitly declare connection.transport: "sse".
  mcp:
    protocol-version: ${CONDUIT_MCP_PROTOCOL_VERSION:2025-11-25}
    legacy-protocol-version: ${CONDUIT_MCP_LEGACY_PROTOCOL_VERSION:2024-11-05}
  registry:
    # Where the agent manifests live. Owned by the registry service; the gateway reads only the
    # domain manifests from here, never the agent ones (those it reads from Redis).
    location: ${CONDUIT_REGISTRY_LOCATION:classpath:}
    ingest:
      # The registry service ingests on startup. Never enable this in the gateway: the gateway has
      # no registrar, no corpus embedder and no index writer, and must not acquire them.
      enabled: ${CONDUIT_REGISTRY_INGEST_ENABLED:true}
      # A registry that does not fully load is not a degraded registry, it is an unknown one.
      fail-on-invalid: ${CONDUIT_REGISTRY_INGEST_FAIL_ON_INVALID:true}
      # The folder is the source of truth. An agent it no longer describes is deregistered,
      # rather than lingering in Redis, visible to the catalogue and the planner, forever.
      prune-orphans: ${CONDUIT_REGISTRY_INGEST_PRUNE_ORPHANS:true}
    readiness:
      # The gateway refuses to start unless the index exists, holds agents, and was built by the
      # same embedding model it uses for queries.
      enabled: ${CONDUIT_REGISTRY_READINESS_ENABLED:true}
  embedding:
    # 'remote' is the real semantic model; 'hash' is a non-semantic stand-in for tests and offline
    # work. The default used to be 'hash', so a deployment that forgot CONDUIT_EMBEDDING_PROVIDER
    # booted on hashed n-grams and routed on them — self-consistently, and silently wrongly. The
    # default is now the real model: a missing embedding service fails loudly instead.
    provider: ${CONDUIT_EMBEDDING_PROVIDER:remote}   # remote | hash
    dimension: ${CONDUIT_EMBEDDING_DIMENSION:384}
    model: ${CONDUIT_EMBEDDING_MODEL:all-MiniLM-L6-v2}
    remote:
      url: ${CONDUIT_EMBEDDING_REMOTE_URL:http://localhost:8083/v1/embeddings}
    cache:
      # Corpus (manifest example) vectors only — content-addressed by model id + text digest.
      # Never the query path: user questions do not repeat, so caching them buys nothing.
      enabled: ${CONDUIT_EMBEDDING_CACHE_ENABLED:true}
      ttl-seconds: ${CONDUIT_EMBEDDING_CACHE_TTL_SECONDS:2592000}
  resolver:
    confidence-floor: 0.30       # absolute cosine similarity floor
    relative-floor-factor: 0.65  # dynamic floor = max(absolute, topScore * factor); prunes long-tail matches
    top-k: 10
    # Min gap between the leading candidate and the best OTHER-domain candidate for the leader's
    # domain to be trusted as the query's scope (context-aware chat routing). Below this the query
    # is in the cross-domain noise band → abstain to a deterministic clarification. Margin-based
    # (not a raw absolute cutoff) so a lone low-confidence out-of-domain hit is never trusted.
    domain-margin: 0.05
  # T1.6 — general routing abstain gate, applied to EVERY resolve (debug + contextual chat).
  # Distinct from conduit.resolver.domain-margin above (which compares the leader against the
  # best OTHER-domain candidate): this is a raw top-1 floor and a raw top-1-vs-top-2 margin,
  # independent of domain. Either check failing means "the router is guessing" → abstain to the
  # deterministic clarify/decline path instead of serving a low-confidence pick.
  routing:
    # Absolute floor below which the leader is untrustworthy on its own (e.g. a genuinely
    # out-of-scope ask). Chosen with daylight on both sides of the labeled eval set: comfortably
    # above known junk matches (~0.31-0.34) and comfortably below the weakest legitimate match
    # observed (~0.44) — see eval/goal-pick/labeled_queries.json + docs/specs/routing-hardening-T1.6.md.
    min-score: 0.40
    # Minimum top-1-vs-top-2 raw score gap. Deliberately conservative (near-zero): the labeled
    # eval set's thinnest LEGITIMATE margin is ~0.007, so this only catches a genuine near-tie
    # (the router truly cannot tell two candidates apart), not an honest close call.
    min-margin: 0.005
    rerank:
      enabled: ${CONDUIT_ROUTING_RERANK_ENABLED:true}
      # Invoke the LLM only for near-ties; clear embedding winners stay on the fast path.
      margin-threshold: ${CONDUIT_ROUTING_RERANK_MARGIN_THRESHOLD:0.13}
      # Also rerank weak-but-eligible leaders close to the abstain floor, giving the model a
      # chance to choose among the bounded candidates or strengthen abstain.
      abstain-adjacent-band: ${CONDUIT_ROUTING_RERANK_ABSTAIN_ADJACENT_BAND:0.08}
      max-candidates: ${CONDUIT_ROUTING_RERANK_MAX_CANDIDATES:5}
    # Piece 5 — conflict trigger. A rerank/abstain HINT only, never a denial: when the routed leader's
    # domain is NOT among the grounded references' domains, the near-tie rerank runs with STRICTER error
    # handling (a reranker error/invalid answer abstains instead of trusting the embedding leader).
    # Ships OFF — enabled only after Piece 6's top-k recall gate passes, since a contaminated shortlist
    # can exclude the right capability and the LLM cannot recover an absent candidate. Off ⇒ inert.
    rerank-conflict-trigger:
      enabled: ${CONDUIT_ROUTING_RERANK_CONFLICT_TRIGGER_ENABLED:false}
    # Piece 3 — shared pre-routing preparation. A resolved entity span is blanked from the routing
    # text with this neutral deictic so routing keys on the CAPABILITY asked, not the entity named.
    # World-B: the token is validated at runtime to never equal an entity-type display/resolveType/key
    # (banned → falls back to a pure deictic). NOT a domain literal — a generic English placeholder.
    entity-mask-token: ${CONDUIT_ROUTING_ENTITY_MASK_TOKEN:the subject}
    # Config-driven near-empty policy (no Java word list, CLAUDE.md §5): after masking, a residual
    # carrying only these function/request words is "near-empty" and widens to the full masked window
    # before the router decides. Generic English stopwords + request verbs — zero domain vocabulary.
    residual-stopwords: >-
      the,a,an,and,or,but,for,of,to,in,on,at,by,with,from,about,as,is,are,was,were,be,been,
      me,my,mine,our,ours,your,yours,their,it,its,that,this,these,those,them,they,
      show,give,tell,get,pull,find,list,see,view,provide,share,send,fetch,check,look,
      please,can,could,would,will,shall,do,does,did,now,then,also,just,what,whats,which,who
    # Minimum non-stopword, non-mask content tokens a masked residual must carry to route on its own.
    min-residual-content-tokens: ${CONDUIT_ROUTING_MIN_RESIDUAL_CONTENT_TOKENS:1}
    # Piece 6 — the preparation/masking contract version stamped onto every /debug/route decision so the
    # goal-pick harness can assert the endpoint exercised the CURRENT production preparation (not a stale
    # or forked one). Bump this string whenever the masking/relaxation contract changes materially.
    preparation-version: ${CONDUIT_ROUTING_PREPARATION_VERSION:route-prep-v2}
  # Piece 2 — multi-reference grounding budgets. Grounding every mention across all its manifest
  # interpretations fans out coverage RESOLVE+CHECK calls (each ≤5s); these bounds cap the fan-out,
  # bound its concurrency, and give the stage a deadline (unfinished interpretations fail-closed).
  # Piece 6 — the production-path routing DECISION endpoint (POST /debug/route). Config-gated so it is
  # never a prod attack surface: the controller bean only exists when this is true. ON for the everyday
  # demo (the goal-pick harness drives it with each row's own persona token); a prod profile MUST leave
  # it false. The endpoint invokes no agent and mutates nothing — it returns the routing decision only,
  # authorized as an authenticated (non-admin) caller against the caller's OWN coverage.
  debug:
    route-decision:
      # OFF by default (B2): this endpoint is a routing-diagnostic surface (below-floor candidate
      # catalog + per-sub-domain grounding statuses = an existence oracle) reachable by any
      # authenticated principal. Enabled explicitly for the demo/eval via docker-compose, never in prod.
      enabled: ${CONDUIT_DEBUG_ROUTE_DECISION_ENABLED:false}
  grounding:
    max-mentions: ${CONDUIT_GROUNDING_MAX_MENTIONS:8}
    max-interpretations-per-mention: ${CONDUIT_GROUNDING_MAX_INTERPRETATIONS_PER_MENTION:4}
    concurrency: ${CONDUIT_GROUNDING_CONCURRENCY:8}
    stage-deadline-ms: ${CONDUIT_GROUNDING_STAGE_DEADLINE_MS:8000}
    # Compare-CLARIFY (spec §3): when a request binds ≥1 entity but names MORE than it bound, ask ONE
    # deterministic question instead of a silent one-sided compare. `enabled` is the kill-switch (OFF ⇒
    # pre-feature behaviour, byte-identical); `max-resolves` caps the Tier-B residual RESOLVE fan-out on
    # affected shapes only (innocent single-entity queries filter to zero candidates).
    residual-detection:
      enabled: ${CONDUIT_GROUNDING_RESIDUAL_DETECTION:true}
      max-resolves: ${CONDUIT_GROUNDING_RESIDUAL_MAX_RESOLVES:3}
  groups:
    # Multi-entity COMPARE fan-out caps (Multi-Entity Compare §D4). Capping is deterministic (mention
    # order) and never silent — it is logged, traced, and stated in the answer.
    max-entity-bindings: ${CONDUIT_GROUPS_MAX_ENTITY_BINDINGS:3}   # entities compared per request
    max-total-groups: ${CONDUIT_GROUPS_MAX_TOTAL:6}                # facet×entity groups after expansion
  chat:
    # Recent user turns (incl. current) concatenated into the routing query so keyword-less
    # follow-ups inherit the conversation's domain vocabulary. Bounded to limit domain drift.
    routing-context-turns: 4
    # Domain-neutral entity-resolution endpoint (legacy fallback resolver; the live World-B path
    # resolves via CoverageClient using the manifest's coverage.resolve_url). No domain literal.
    entity-resolve-url: ${CONDUIT_RESOLVER_ENTITY_RESOLVE_URL:http://mock-crm:8085/entities/resolve}
  llm:
    # ── Intent Classifier (classification + routing) ──────────────────────────
    # Default: Z.AI GLM (fast flash model for low-latency classification).
    # Override per-client via CONDUIT_LLM_*_BASE_URL / MODEL / API_KEY env vars.
    # To use OpenAI: set CONDUIT_LLM_*_BASE_URL=https://api.openai.com/v1 + OPENAI_API_KEY.
    intent-classifier:
      base-url: ${CONDUIT_LLM_INTENT_CLASSIFIER_BASE_URL:https://api.z.ai/api/paas/v4}
      api-key: ${CONDUIT_LLM_INTENT_CLASSIFIER_API_KEY:${ZAI_API_KEY:}}
      model: ${CONDUIT_LLM_INTENT_CLASSIFIER_MODEL:glm-4.5-flash}
      # Intent classification runs synchronously before the first SSE byte, so it gets its own
      # bounded latency budget (~20s worst case) — independent of the (streamed) synthesizer's
      # conduit.llm.* budget, which could otherwise burn ~81s (3 retries × 25s + backoff).
      max-retries: ${CONDUIT_LLM_INTENT_CLASSIFIER_MAX_RETRIES:2}
      retry-initial-delay-ms: ${CONDUIT_LLM_INTENT_CLASSIFIER_RETRY_INITIAL_DELAY_MS:200}
      retry-backoff-multiplier: ${CONDUIT_LLM_INTENT_CLASSIFIER_RETRY_BACKOFF_MULTIPLIER:2}
      request-timeout-seconds: ${CONDUIT_LLM_INTENT_CLASSIFIER_REQUEST_TIMEOUT_SECONDS:10}
    routing-reranker:
      base-url: ${CONDUIT_LLM_ROUTING_RERANKER_BASE_URL:${CONDUIT_LLM_INTENT_CLASSIFIER_BASE_URL:https://api.z.ai/api/paas/v4}}
      api-key: ${CONDUIT_LLM_ROUTING_RERANKER_API_KEY:${CONDUIT_LLM_INTENT_CLASSIFIER_API_KEY:${ZAI_API_KEY:}}}
      model: ${CONDUIT_LLM_ROUTING_RERANKER_MODEL:${CONDUIT_LLM_INTENT_CLASSIFIER_MODEL:glm-4.5-flash}}
      temperature: ${CONDUIT_LLM_ROUTING_RERANKER_TEMPERATURE:0.0}
      request-timeout-seconds: ${CONDUIT_LLM_ROUTING_RERANKER_REQUEST_TIMEOUT_SECONDS:8}
    # ── Entity Extractor (pull relationship/fund/ticker from user prompt) ─────
    entity-extractor:
      base-url: ${CONDUIT_LLM_ENTITY_EXTRACTOR_BASE_URL:https://api.z.ai/api/paas/v4}
      api-key: ${CONDUIT_LLM_ENTITY_EXTRACTOR_API_KEY:${ZAI_API_KEY:}}
      model: ${CONDUIT_LLM_ENTITY_EXTRACTOR_MODEL:glm-4.5-flash}
    # ── Clarification Composer (natural clarify wording — opt-in per domain) ───
    # Phrases a clarifying question over the GROUNDED candidate set when a domain sets
    # clarify_style: composed. Never decides to clarify; output is validated (no foreign IDs) and
    # falls back to the deterministic template on any rejection/failure. Defaults inherit the
    # intent-classifier's fast/cheap flash model + key.
    clarification-composer:
      base-url: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_BASE_URL:${CONDUIT_LLM_INTENT_CLASSIFIER_BASE_URL:https://api.z.ai/api/paas/v4}}
      api-key: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_API_KEY:${CONDUIT_LLM_INTENT_CLASSIFIER_API_KEY:${ZAI_API_KEY:}}}
      model: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_MODEL:${CONDUIT_LLM_INTENT_CLASSIFIER_MODEL:glm-4.5-flash}}
      temperature: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_TEMPERATURE:0.4}
      max-output-chars: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_MAX_OUTPUT_CHARS:1200}
      max-retries: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_MAX_RETRIES:1}
      retry-initial-delay-ms: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_RETRY_INITIAL_DELAY_MS:200}
      retry-backoff-multiplier: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_RETRY_BACKOFF_MULTIPLIER:2}
      request-timeout-seconds: ${CONDUIT_LLM_CLARIFICATION_COMPOSER_REQUEST_TIMEOUT_SECONDS:8}
    # ── Answer Synthesizer (grounded streaming answer) ────────────────────────
    synthesizer:
      base-url: ${CONDUIT_LLM_SYNTHESIZER_BASE_URL:https://api.z.ai/api/paas/v4}
      api-key: ${CONDUIT_LLM_SYNTHESIZER_API_KEY:${ZAI_API_KEY:}}
      model: ${CONDUIT_LLM_SYNTHESIZER_MODEL:glm-4.6}
    # Set to true to stream the model's chain-of-thought as a blockquote before the answer
    show-reasoning: ${CONDUIT_LLM_SHOW_REASONING:false}
    max-retries: ${CONDUIT_LLM_MAX_RETRIES:3}
    retry-initial-delay-ms: ${CONDUIT_LLM_RETRY_INITIAL_DELAY_MS:2000}
    retry-backoff-multiplier: ${CONDUIT_LLM_RETRY_BACKOFF_MULTIPLIER:2}
    request-timeout-seconds: ${CONDUIT_LLM_REQUEST_TIMEOUT_SECONDS:25}
  orchestration:
    fan-out-deadline-ms: ${CONDUIT_FANOUT_DEADLINE_MS:60000}
    map:
      max-items: ${CONDUIT_ORCHESTRATION_MAP_MAX_ITEMS:100}
      max-concurrency: ${CONDUIT_ORCHESTRATION_MAP_MAX_CONCURRENCY:8}
    harness:
      default-sla-ms: ${CONDUIT_HARNESS_DEFAULT_SLA_MS:5000}
      bulkhead:
        max-concurrent: ${CONDUIT_HARNESS_BULKHEAD_MAX_CONCURRENT:5}
        queue-capacity: ${CONDUIT_HARNESS_BULKHEAD_QUEUE_CAPACITY:20}
      circuit-breaker:
        failure-rate-threshold: ${CONDUIT_CB_FAILURE_RATE_THRESHOLD:50}
        slow-call-rate-threshold: ${CONDUIT_CB_SLOW_CALL_RATE_THRESHOLD:80}
        slow-call-duration-seconds: ${CONDUIT_CB_SLOW_CALL_DURATION_SECONDS:10}
        open-wait-seconds: ${CONDUIT_CB_OPEN_WAIT_SECONDS:30}
        sliding-window-size: ${CONDUIT_CB_SLIDING_WINDOW_SIZE:10}
        min-calls: ${CONDUIT_CB_MIN_CALLS:3}
        half-open-permitted-calls: ${CONDUIT_CB_HALF_OPEN_PERMITTED_CALLS:2}
  telemetry:
    trace-ttl-seconds: ${CONDUIT_TELEMETRY_TRACE_TTL_SECONDS:86400}
  session:
    ttl-seconds: ${CONDUIT_SESSION_TTL_SECONDS:1800}   # 30 min idle expiry
  authz:
    # Cerbos resource kind for entity-level checks (e.g. relationship, account, deal).
    # Domain teams declare this; the gateway carries no hardcoded domain literal (World B).
    resource-type: ${CONDUIT_AUTHZ_RESOURCE_TYPE:relationship}
  coverage:
    wealth-management:
      url: ${WEALTH_COVERAGE_URL:http://wealth-coverage:8086}
  cerbos:
    host: ${CERBOS_HOST:localhost}
    http-port: ${CERBOS_HTTP_PORT:3592}
    # closed (default) = Cerbos unreachable → deny all (production safe)
    # local = Cerbos unreachable → fall back to JWT book claim (demo resilience)
    fail-mode: ${CONDUIT_CERBOS_FAIL_MODE:closed}
  # ── Conduit Insights (native, admin-gated analytics API) ──────────────────────
  # Aggregates Prometheus (ops) + Langfuse (cost/eval) behind /v1/insights/*.
  # No hardcoded endpoints/keys — everything via env. In docker the gateway reaches
  # Prometheus at prometheus:9090 and Langfuse at langfuse:3000 (internal port).
  insights:
    prometheus-url: ${CONDUIT_INSIGHTS_PROMETHEUS_URL:http://prometheus:9090}
    langfuse-url: ${CONDUIT_INSIGHTS_LANGFUSE_URL:http://langfuse:3000}
    langfuse-public-key: ${CONDUIT_INSIGHTS_LANGFUSE_PUBLIC_KEY:${LANGFUSE_PROJECT_PUBLIC_KEY:}}
    langfuse-secret-key: ${CONDUIT_INSIGHTS_LANGFUSE_SECRET_KEY:${LANGFUSE_PROJECT_SECRET_KEY:}}
    # VT fan-out discipline: dedicated bounded executor, deadline-bound board, per-query timeout,
    # backpressure to the upstreams, and a short-TTL cache on the (slower) Langfuse side.
    board-deadline-ms: ${CONDUIT_INSIGHTS_BOARD_DEADLINE_MS:4000}
    per-query-timeout-ms: ${CONDUIT_INSIGHTS_PER_QUERY_TIMEOUT_MS:3000}
    connect-timeout-ms: ${CONDUIT_INSIGHTS_CONNECT_TIMEOUT_MS:2000}
    max-concurrent-queries: ${CONDUIT_INSIGHTS_MAX_CONCURRENT_QUERIES:8}
    permit-wait-ms: ${CONDUIT_INSIGHTS_PERMIT_WAIT_MS:2000}
    cache-ttl-seconds: ${CONDUIT_INSIGHTS_CACHE_TTL_SECONDS:20}
  # ── LLM token pricing (config-driven cost analytics) ──────────────────────────
  # registry/model-prices.json is the SINGLE source of pricing truth. The insights module
  # multiplies Langfuse's per-model token counts by these rates ITSELF, so cost is correct even
  # when Langfuse's own model-pricing was never seeded. No prices are hardcoded in Java (World B).
  # In docker the registry is mounted at /registry (CONDUIT_REGISTRY_LOCATION=file:/registry/).
  pricing:
    config-path: ${CONDUIT_PRICING_CONFIG_PATH:file:/registry/model-prices.json}
    reload-check-ms: ${CONDUIT_PRICING_RELOAD_CHECK_MS:10000}

logging:
  pattern:
    # Include OTel trace/span IDs plus MDC keys in every log line for Tempo ↔ Loki pivots.
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId} spanId=%X{spanId} rid=%X{requestId} cid=%X{conversationId} uid=%X{userId}] - %msg%n"
  level:
    ai.conduit: DEBUG
    org.springframework.web: INFO
    io.opentelemetry: WARN
