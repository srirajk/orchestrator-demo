server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $iam_upstream http://iam-service:8084;
    set $gateway_upstream http://gateway:8080;

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $iam_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /gateway-api/ {
        rewrite ^/gateway-api/(.*)$ /$1 break;
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 150s;
    }

    # Content-hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The SPA shell must NEVER be cached, or a browser keeps rendering a stale
    # pre-deploy bundle (e.g. an old auth guard / removed nav) against a new backend.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
}
